{x:1200, y:260, type:'flyer', pL:800, pR:1800, cfg:{speed:2.0,hp:3,shootRate:55,shootRateRand:25}},
{x:2800, y:250, type:'flyer', pL:2200, pR:3400, cfg:{speed:2.2,hp:3,shootRate:50,shootRateRand:20}},
{x:4500, y:270, type:'flyer', pL:4000, pR:5200, cfg:{speed:2.2,hp:4,shootRate:50,shootRateRand:20}},
{x:6000, y:240, type:'flyer', pL:5500, pR:6500, cfg:{speed:2.3,hp:4,shootRate:45,shootRateRand:20}},
            ],
            pickups: [
                {x:1150, y:452, type:'burst'},
                {x:3200, y:452, type:'railgun'},
            ],
            boss: {x:6700,y:360,hp:46,name:'The Kingpin',color:'#cc44ff',drawType:'lord',shootRate:28,jumpRate:60,spreadCount:3,arenaL:5960,arenaR:6980,speed:3.5,quote:'"This is MY city. You die on MY dance floor."'},
            bgDraw: function(cx) {
                const gy = 480 - cam.y;
                const t = Date.now() / 1000;
                // Lightning flash
                if (lightningAlpha > 0) {
                    cx.fillStyle = `rgba(200,180,255,${lightningAlpha})`;
                    cx.fillRect(0, 0, GW, GH);
                }
                cx.fillStyle = '#08000e';
                cx.fillRect(0, 0, GW, GH);
                // Pulsing colored lights cycling hue
                for (let i = 0; i < 8; i++) {
                    const hue = ((t * 30 + i * 45) % 360);
                    const lx = (i * 130 + 50) % GW;
                    const ly = 60 + Math.sin(t*2 + i)*30;
                    cx.globalAlpha = 0.08 + Math.sin(t*3+i)*0.04;
                    cx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                    cx.beginPath(); cx.arc(lx, ly, 50 + Math.sin(t*2+i)*15, 0, Math.PI*2); cx.fill();
                }
                cx.globalAlpha = 1;
                // Laser beams
                for (let i = 0; i < 5; i++) {
                    const ceilY = 40 - cam.y;
                    const lAngle = Math.sin(t*1.5 + i*1.3) * 0.8;
                    const lx = 150 + i * 180;
                    cx.globalAlpha = 0.15;
                    const laserHue = ((t * 50 + i * 72) % 360);
                    cx.strokeStyle = `hsl(${laserHue}, 100%, 60%)`;
                    cx.lineWidth = 1.5;
                    cx.beginPath(); cx.moveTo(lx, ceilY+5);
                    cx.lineTo(lx + Math.sin(lAngle)*400, gy);
                    cx.stroke();
                }
                cx.globalAlpha = 1;
                // Disco ball
                const discoBallX = GW/2;
                const discoBallY = 55 - cam.y;
                cx.fillStyle = '#aaaaaa';
                cx.beginPath(); cx.arc(discoBallX, discoBallY, 8, 0, Math.PI*2); cx.fill();
                for (let i = 0; i < 12; i++) {
                    const refAngle = (i/12)*Math.PI*2 + t*0.8;
                    const refDist = 80 + Math.sin(t+i)*40;
                    const rx = discoBallX + Math.cos(refAngle)*refDist;
                    const ry = discoBallY + Math.sin(refAngle)*refDist*0.5;
                    cx.globalAlpha = 0.12 + Math.sin(t*2+i)*0.06;
                    cx.fillStyle = '#ffffff';
                    cx.fillRect(rx-2, ry-2, 4, 4);
                }
                cx.globalAlpha = 1;
                // Bar with bottles
                for (let bx = 200; bx < 6800; bx += 1500) {
                    const screenX = bx - cam.x * 0.2;
                    cx.fillStyle = '#1a0a20';
                    cx.fillRect(screenX, gy-40, 100, 40);
                    const bottleColors = ['#44ff44', '#ff4444', '#4444ff', '#ffff44', '#ff44ff'];
                    for (let i = 0; i < 5; i++) {
                        cx.fillStyle = bottleColors[i] + '44';
                        cx.fillRect(screenX + 8 + i*18, gy-55, 6, 15);
                        cx.fillRect(screenX + 9 + i*18, gy-60, 4, 5);
                    }
                }
                // Speaker stacks
                for (let sx = 100; sx < 7000; sx += 900) {
                    const screenX = sx - cam.x;
                    cx.fillStyle = '#111';
                    cx.fillRect(screenX, gy-60, 25, 60);
                    cx.strokeStyle = '#333'; cx.lineWidth = 1;
                    const pulse = Math.sin(t*8+sx)*2;
                    cx.beginPath(); cx.arc(screenX+12, gy-40, 8+pulse, 0, Math.PI*2); cx.stroke();
                    cx.beginPath(); cx.arc(screenX+12, gy-20, 6+pulse*0.5, 0, Math.PI*2); cx.stroke();
                }
                // Smoke/haze
                for (let i = 0; i < 20; i++) {
                    const hx = ((t * 8 + i * 370) % (GW + 300)) - 150;
                    const hy = 150 + Math.sin(t*0.4+i*0.9)*100 + i*10;
                    cx.globalAlpha = 0.03 + Math.sin(t*0.5+i)*0.015;
                    cx.fillStyle = '#8866aa';
                    cx.beginPath(); cx.arc(hx, hy, 30+Math.sin(t+i)*10, 0, Math.PI*2); cx.fill();
                }
                cx.globalAlpha = 1;
            }
        }
    ];
}

// ======================== LEVEL LOADING ========================
function loadLevel(n) {
    const levels = getLevels();
    const lv = levels[n];
    platforms = lv.platforms.map(p => ({...p}));
    const hpAdj = [1, 1, 0, 0, -1][n] || 0;
    let enemyList = lv.enemies.slice();
    // NG+ / NG++: add more enemies, spread throughout level with variety
    const extraPct = newGamePlus === 2 ? 0.4 : (newGamePlus === 1 ? 0.2 : 0);
    if (extraPct > 0) {
        const extra = Math.ceil(enemyList.length * extraPct);
        const types = ['walker', 'shooter', 'exploder', 'flyer'];
        for (let i = 0; i < extra; i++) {
            const srcIdx = 1 + Math.floor((i + 1) * (enemyList.length - 1) / (extra + 1));
            const src = enemyList[Math.min(srcIdx, enemyList.length - 1)];
            const newType = types[(i + srcIdx) % types.length];
            // Place within source's patrol range to avoid falling off platforms
            const range = src.pR - src.pL;
            const newX = src.pL + ((80 + (i * 67) % 150) % Math.max(range - 30, 1)) + 15;
            const newY = newType === 'flyer' ? Math.min(src.y - 150, 280) : src.y;
            enemyList.push({...src, x: newX, y: newY, type: newType,
                pL: src.pL, pR: src.pR});
        }
    }
    // Nudge ground enemies out of solid obstacles (prevents NG++ spawns inside dumpsters/crates)
    for (const e of enemyList) {
        if (e.type === 'flyer') continue;
        const ew = 20, eh = 44;
        for (const p of platforms) {
            if (p.h <= 20) continue;
            if (p.w > 200) continue; // skip main ground platforms
            if (e.x < p.x + p.w && e.x + ew > p.x && e.y < p.y + p.h && e.y + eh > p.y) {
                const leftDist = (e.x + ew) - p.x;
                const rightDist = (p.x + p.w) - e.x;
                if (leftDist < rightDist) e.x = p.x - ew - 5;
                else e.x = p.x + p.w + 5;
            }
        }
    }
    const hpMult = newGamePlus === 2 ? 1.3 : (newGamePlus === 1 ? 1.15 : 1);
    const rateMult = newGamePlus === 2 ? 0.5 : (newGamePlus === 1 ? 0.7 : 1);
    enemies = enemyList.map(e => {
        const en = new Enemy(e.x, e.y, e.type, e.pL, e.pR, e.cfg);
        en.hp = Math.max(1, en.hp + hpAdj);
        en.maxHp = en.hp;
        if (newGamePlus > 0) {
            en.hp = Math.ceil(en.hp * hpMult);
            en.maxHp = en.hp;
            en.shootRate = Math.floor(en.shootRate * rateMult);
            en.shootRateRand = Math.floor(en.shootRateRand * rateMult);
        }
        return en;
    });
    pickups = (lv.pickups || []).map(p => new Pickup(p.x, p.y, p.type));
    // Grenade launcher pickups disabled - code preserved for future use
    // if (newGamePlus > 0) {
    //     const grenadePos = { 1:{x:2620,y:352}, 2:{x:2480,y:362}, 3:{x:3520,y:342}, 4:{x:4520,y:342} };
    //     if (grenadePos[n]) pickups.push(new Pickup(grenadePos[n].x, grenadePos[n].y, 'grenade'));
    // }
    const bossCfg = {...lv.boss};
    if (newGamePlus > 0) {
        bossCfg.hp = Math.ceil(bossCfg.hp * hpMult);
        bossCfg.shootRate = Math.floor(bossCfg.shootRate * rateMult);
    }
    boss = new Boss(bossCfg);
    boss.projSpeedMult = newGamePlus === 2 ? 1.35 : (newGamePlus === 1 ? 1.2 : 1);
    player = new Player(lv.playerStart.x, lv.playerStart.y);
    projectiles = [];
    particles = [];
    bombs = [];
    grenades = [];
    shockwaves = [];
    railBeams = [];
    scorePopups = [];
    bossActive = false;
    bossDeadTimer = 0;
    stageTimer = newGamePlus === 2 ? 500 : (newGamePlus === 1 ? 400 : 300); stageTimerTick = 0;
    lightningAlpha = 0; lightningCD = 0;
    cam.x = 0; cam.y = 0;
    playMusic(lv.musicType || 'city');
    return lv;
}

function lifeUpThreshold() { return newGamePlus === 2 ? 20000 : (newGamePlus === 1 ? 15000 : 10000); }

function checkExtraLife() {
    while (score >= nextLifeAt) {
        lives++;
        nextLifeAt += lifeUpThreshold();
        lifeUpTimer = 120;
        playSound('levelup');
    }
}

function startNewGame() {
    score = 0;
    lives = 3;
    nextLifeAt = lifeUpThreshold();
    lifeUpTimer = 0;
    comboMultiplier = 1; comboTimer = 0;
    currentLevel = 0;
    levelInfo = loadLevel(currentLevel);
    gameState = 'playing';
}

let levelInfo;

// ======================== UPDATE ========================
function update() {
    // Cutscene timers (always tick at fixed rate)
    if (gameState === 'intro' || gameState === 'ending') {
        cutsceneTimer++;
    }
    // Life-up timer
    if (lifeUpTimer > 0) lifeUpTimer--;

    if (gameState !== 'playing') return;

    // Combo timer tick
    if (comboTimer > 0) {
        comboTimer--;
        if (comboTimer <= 0) comboMultiplier = 1;
    }

    // Stage timer tick (decrements by 1 twice per second = every 30 frames)
    if (player.alive && boss.alive) {
        stageTimerTick++;
        if (stageTimerTick >= 30) {
            stageTimerTick = 0;
            stageTimer--;
            if (stageTimer <= 0) {
                stageTimer = 0;
                player.hp = 0;
                player.alive = false;
            }
        }
    }

    player.update();

    // Check boss activation
    if (!bossActive && boss.alive && player.x > levelInfo.bossActivateX) {
        bossActive = true;
        boss.active = true;
        // Wall well behind player to prevent retreat
        const wallX = player.x - 60;
        platforms.push({x: wallX, y: 0, w: 15, h: 540});
        // Clamp player to right of wall to prevent dash-through
        if (player.x < wallX + 15) player.x = wallX + 15;
        // Switch to boss music
        playMusic(currentLevel === 4 ? 'finalboss' : 'boss');
    }

    // Update enemies
    enemies.forEach(e => e.update());

    // Update boss
    if (boss.alive && boss.active) boss.update();

    // Update pickups
    pickups.forEach(p => {
        if (p.collected) return;
        p.update();
        if (player.alive && rects(player, {x:p.x,y:p.y-4,w:p.w,h:p.h+8})) {
            p.collected = true;
            player.weapon = { ...WEAPONS[p.weaponType], type: p.weaponType };
            playSound('pickup');
            spawnParticles(p.x + p.w/2, p.y + p.h/2, WEAPONS[p.weaponType].color, 8);
        }
    });

    // Update projectiles
    projectiles.forEach(p => p.update());
    projectiles = projectiles.filter(p => p.alive);

    // Update particles
    particles.forEach(p => p.update());
    particles = particles.filter(p => p.life > 0);

    // Update score popups
    scorePopups.forEach(sp => {
        sp.y += sp.vy;
        sp.vy += 0.12;
        sp.life--;
    });
    scorePopups = scorePopups.filter(sp => sp.life > 0);

    // Update bombs
    bombs.forEach(b => b.update());
    bombs = bombs.filter(b => !b.exploded);

    // Update grenades
    grenades.forEach(g => g.update());
    grenades = grenades.filter(g => g.alive);

    // Update shockwaves
    shockwaves.forEach(s => s.update());
    shockwaves = shockwaves.filter(s => s.alive);

    // Update rail beams (visual only)
    railBeams.forEach(b => b.life--);
    railBeams = railBeams.filter(b => b.life > 0);

    // Player projectiles hit enemies
    projectiles.filter(p => p.owner === 'player').forEach(proj => {
        enemies.forEach(e => {
            if (e.alive && rects({x:proj.x-3,y:proj.y-3,w:6,h:6}, e)) {
                e.takeDamage(proj.x, proj.damage, proj.batchId);
                if (!proj.piercing) proj.alive = false;
                spawnParticles(proj.x, proj.y, '#ffff44', 3);
            }
        });
        if (boss.alive && boss.active && rects({x:proj.x-3,y:proj.y-3,w:6,h:6}, boss)) {
            boss.takeDamage(proj.x, proj.damage, proj.batchId);
            if (!proj.piercing) proj.alive = false;
            spawnParticles(proj.x, proj.y, '#ffff44', 3);
        }
    });

    // Enemy projectiles hit player
    projectiles.filter(p => p.owner === 'enemy').forEach(proj => {
        if (player.alive && rects({x:proj.x-3,y:proj.y-3,w:6,h:6}, player)) {
            if (player.parryTimer > 0) {
                proj.vx *= -1.5;
                proj.vy *= -1.5;
                proj.owner = 'player';
                proj.color = '#ffff44';
                proj.damage = 3;
                spawnParticles(proj.x, proj.y, '#ffff44', 10);
                spawnParticles(player.cx, player.cy, '#ffffff', 6);
                spawnParticles(player.cx, player.cy, '#ffff00', 8);
                shake = 10;
                player.parrySuccess = true;
                player.parryCooldown = 0;
                player.parryTimer = Math.max(player.parryTimer, 6); // extend to 0.25s total (add 0.1s = 6 frames)
                comboTimer = comboMaxTimer; // reset combo decay timer
                score += 30 * comboMultiplier;
                spawnScorePopup(player.cx, player.cy - 20, 30 * comboMultiplier);
                // Parry ping sound
                try {
                    ensureAudio();
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    const t = audioCtx.currentTime;
                    o.type = 'sine';
                    o.frequency.setValueAtTime(1200, t);
                    o.frequency.setValueAtTime(1800, t + 0.04);
                    o.frequency.setValueAtTime(2400, t + 0.08);
                    g.gain.setValueAtTime(0.12, t);
                    g.gain.linearRampToValueAtTime(0, t + 0.15);
                    o.start(t); o.stop(t + 0.15);
                } catch(e) {}
            } else if (player.invuln <= 0) {
                player.takeDamage(proj.x);
                proj.alive = false;
            }
        }
    });

    // Enemy contact damage
    enemies.forEach(e => {
        if (e.alive && player.alive && player.invuln <= 0 && rects(player, e)) {
            player.takeDamage(e.cx);
        }
    });
    // Boss contact damage
    if (boss.alive && boss.active && !boss.shadowMode && player.alive && player.invuln <= 0 && rects(player, boss)) {
        player.takeDamage(boss.cx);
    }

    // Boss dead -> level complete
    if (!boss.alive && bossActive) {
        bossDeadTimer--;
        if (bossDeadTimer <= 0) {
            if (currentLevel < 4) {
                gameState = 'levelComplete';
                levelTransTimer = 180;
                timerBonusCountdown = stageTimer;
                timerBonusScore = 0;
                timerBonusSoundTick = 0;
                playSound('levelup');
                playMusic('victory');
            } else {
                gameState = 'levelComplete';
                levelTransTimer = 180;
                timerBonusCountdown = stageTimer;
                timerBonusScore = 0;
                timerBonusSoundTick = 0;
                playSound('levelup');
                playMusic('finalvictory');
            }
        }
    }

    // Player dead
    if (!player.alive) {
        lives--;
        playMusic('death');
        if (lives >= 0) {
            gameState = 'dead';
        } else {
            gameState = 'gameover';
        }
        deathMsgTimer = 120;
    }

    // Camera follow player with mouse-look offset
    const mouseWorldX = mouse.x + cam.x;
    const mouseWorldY = mouse.y + cam.y;
    const lookOffsetX = (mouseWorldX - player.cx) * 0.3;
    const lookOffsetY = (mouseWorldY - player.cy) * 0.15;
    const targetCamX = player.cx - GW/2 + lookOffsetX;
    const targetCamY = player.cy - GH/2 + 50 + lookOffsetY;
    cam.x = lerp(cam.x, Math.max(0, Math.min(targetCamX, levelInfo.width - GW)), 0.06);
    cam.y = lerp(cam.y, Math.max(-100, Math.min(targetCamY, 100)), 0.06);

    // Screen shake
    if (shake > 0) shake *= 0.85;
    if (shake < 0.5) shake = 0;

    // Lightning (stage 5) - tick at fixed rate
    if (lightningCD > 0) lightningCD--;
    if (lightningCD <= 0 && Math.random() < 0.003) {
        lightningAlpha = 0.18;
        lightningCD = 180 + Math.floor(rand(0, 200));
    }
    if (lightningAlpha > 0) {
        lightningAlpha *= 0.82;
        if (lightningAlpha < 0.005) lightningAlpha = 0;
    }
}

// ======================== RENDERING ========================
function drawBackground() {
    // Sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, GH);
    grad.addColorStop(0, levelInfo.sky1);
    grad.addColorStop(1, levelInfo.sky2);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, GW, GH);

    // Level-specific background
    if (levelInfo.bgDraw) levelInfo.bgDraw(ctx);
}

function drawPlatforms() {
    platforms.forEach(p => {
        const sx = p.x - cam.x, sy = p.y - cam.y;
        if (sx + p.w < -50 || sx > GW + 50) return;
        // Main platform body
        ctx.fillStyle = levelInfo.platColor;
        ctx.fillRect(sx, sy, p.w, p.h);
        // Top edge highlight
        ctx.fillStyle = levelInfo.groundColor || '#666';
        ctx.fillRect(sx, sy, p.w, Math.min(4, p.h));
        // Bottom shadow
        if (p.h > 15) {
            ctx.fillStyle = '#00000033';
            ctx.fillRect(sx, sy + p.h - 4, p.w, 4);
        }
    });
}

function drawHUD() {
    // HP hearts
    for (let i = 0; i < player.maxHp; i++) {
        const hx = 15 + i * 28;
        ctx.fillStyle = i < player.hp ? '#ff3333' : '#333';
        drawHeart(ctx, hx, 20, 12);
    }
    // Lives
    ctx.fillStyle = '#ffffffbb';
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`x${lives}`, 15 + player.maxHp * 28 + 8, 31);

    // Weapon info
    const cw = player.weapon;
    ctx.fillStyle = cw.color || '#ffff44';
    ctx.font = 'bold 12px monospace';
    const ammoText = cw.type === 'pistol' ? '∞' : cw.ammo;
    ctx.fillText(`${cw.name} [${ammoText}]`, 15, 48);
    // Parry indicator
    if (player.parryCooldown <= 0) {
        ctx.fillStyle = '#44ffffaa';
        ctx.fillText('PARRY', 15, 62);
    } else {
        ctx.fillStyle = '#44ffff44';
        const pcd = Math.ceil(player.parryCooldown / 60 * 10) / 10;
        ctx.fillText(`PARRY ${pcd.toFixed(1)}s`, 15, 62);
    }
    // Dash indicator
    if (player.dashCooldown <= 0) {
        ctx.fillStyle = '#44ff44aa';
        ctx.fillText('DASH', 15, 76);
    } else {
        ctx.fillStyle = '#44ff4444';
        const cd = Math.ceil(player.dashCooldown / 60 * 10) / 10;
        ctx.fillText(`DASH ${cd.toFixed(1)}s`, 15, 76);
    }

    // Level name
    ctx.fillStyle = '#ffffff88';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    const ngLabel = newGamePlus === 2 ? ' [NG++]' : (newGamePlus === 1 ? ' [NG+]' : '');
    ctx.fillText(`Stage ${currentLevel+1}: ${levelInfo.name}${ngLabel}`, GW/2, 25);
    ctx.textAlign = 'left';

    // Score
    ctx.fillStyle = '#ffcc44';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(`SCORE: ${score}`, GW - 15, 25);
    // Stage timer
    const timerColor = stageTimer <= 30 ? '#ff2222' : stageTimer <= 60 ? '#ff8844' : '#ffffffaa';
    ctx.fillStyle = timerColor;
    ctx.font = stageTimer <= 30 ? 'bold 16px monospace' : '14px monospace';
    ctx.fillText(`TIME: ${stageTimer}`, GW - 15, 42);
    // Music indicator
    ctx.fillStyle = '#ffffff44';
    ctx.font = '11px monospace';
    ctx.fillText(musicOn ? '♪ M' : '♪ OFF', GW - 55, 58);
    ctx.textAlign = 'left';

    // Extra life notification
    if (lifeUpTimer > 0) {
        const alpha = Math.min(1, lifeUpTimer / 30);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#44ff44';
        ctx.font = 'bold 22px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('+1 UP!', GW/2, 80);
        ctx.textAlign = 'left';
        ctx.globalAlpha = 1;
    }

    // Boss HP bar at top of screen when active
    if (bossActive && boss.alive) {
        const bw = 200, bh = 10;
        const bx = GW/2 - bw/2, by = 40;
        ctx.fillStyle = '#222'; ctx.fillRect(bx-1, by-1, bw+2, bh+2);
        ctx.fillStyle = '#600'; ctx.fillRect(bx, by, bw, bh);
        ctx.fillStyle = boss.color; ctx.fillRect(bx, by, bw * (boss.hp/boss.maxHp), bh);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
        ctx.fillText(boss.name, GW/2, by - 4);
        ctx.textAlign = 'left';
    }

    // Combo multiplier display
    if (comboMultiplier > 1) {
        const comboAlpha = Math.min(1, comboTimer / 60);
        const pulse = 1 + Math.sin(Date.now() / 100) * 0.1;
        const comboSize = Math.floor(18 + (comboMultiplier - 1) * 4);
        ctx.save();
        ctx.globalAlpha = comboAlpha;
        ctx.font = `bold ${Math.floor(comboSize * pulse)}px monospace`;
        ctx.textAlign = 'center';
        // Glow
        ctx.fillStyle = comboMultiplier >= 5 ? '#ff4444' : comboMultiplier >= 4 ? '#ff8844' : comboMultiplier >= 3 ? '#ffcc44' : '#44ff44';
        ctx.fillText(`${comboMultiplier}x COMBO`, GW/2, GH - 30);
        // Timer bar
        const barW = 80, barH = 4;
        const barX = GW/2 - barW/2, barY = GH - 20;
        ctx.fillStyle = '#333';
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = comboMultiplier >= 5 ? '#ff4444' : '#44ff44';
        ctx.fillRect(barX, barY, barW * (comboTimer / comboMaxTimer), barH);
        ctx.restore();
    }
}

function drawHeart(cx, x, y, size) {
    cx.beginPath();
    cx.moveTo(x, y + size/4);
    cx.quadraticCurveTo(x, y, x + size/4, y);
    cx.quadraticCurveTo(x + size/2, y, x + size/2, y + size/4);
    cx.quadraticCurveTo(x + size/2, y, x + size * 3/4, y);
    cx.quadraticCurveTo(x + size, y, x + size, y + size/4);
    cx.quadraticCurveTo(x + size, y + size/2, x + size/2, y + size * 3/4);
    cx.quadraticCurveTo(x, y + size/2, x, y + size/4);
    cx.fill();
}

function drawMenu() {
    const t = Date.now() / 1000;

    // Gradient background
    const grad = ctx.createLinearGradient(0, 0, 0, GH);
    grad.addColorStop(0, '#05001a');
    grad.addColorStop(0.5, '#0d0a1a');
    grad.addColorStop(1, '#1a0808');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, GW, GH);

    // City skyline silhouette
    const blds = [[0,45,180],[50,35,130],[90,50,200],[150,40,160],[200,55,220],[260,35,150],[310,45,190],[360,55,170],[420,40,210],[470,50,140],[530,45,230],[580,35,160],[620,55,200],[680,40,180],[730,50,150],[790,45,210],[840,40,170],[890,55,190]];
    ctx.fillStyle = '#0f0818';
    blds.forEach(b => ctx.fillRect(b[0], GH - b[2], b[1], b[2]));
    ctx.fillStyle = '#ffee44';
    blds.forEach(b => {
        for (let wy = GH - b[2] + 15; wy < GH - 10; wy += 20) {
            for (let wx = b[0] + 8; wx < b[0] + b[1] - 5; wx += 12) {
                if (Math.sin(wx * 3 + wy * 7 + t * 0.5) > 0.3) {
                    ctx.globalAlpha = 0.08;
                    ctx.fillRect(wx, wy, 4, 5);
                }
            }
        }
    });
    ctx.globalAlpha = 1;

    // Vignette
    const vig = ctx.createRadialGradient(GW/2, GH/2, GW*0.3, GW/2, GH/2, GW*0.7);
    vig.addColorStop(0, 'transparent');
    vig.addColorStop(1, 'rgba(0,0,0,0.35)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, GW, GH);

    // Rising embers
    for (let i = 0; i < 25; i++) {
        const ex = ((i * 37 + t * 15) % (GW + 40)) - 20;
        const ey = GH - ((t * 25 + i * 50) % (GH + 100));
        ctx.globalAlpha = (0.3 + Math.sin(t * 4 + i * 2) * 0.25) * 0.6;
        ctx.fillStyle = i % 3 === 0 ? '#ff4400' : i % 3 === 1 ? '#ff8800' : '#ffaa22';
        ctx.beginPath(); ctx.arc(ex, ey, 1.5 + Math.sin(t + i) * 0.5, 0, Math.PI*2); ctx.fill();
    }

    // Speed streaks
    for (let i = 0; i < 8; i++) {
        const stx = ((t * 180 + i * 120) % (GW + 200)) - 100;
        const sty = 40 + i * 55;
        const len = 30 + Math.sin(t + i) * 15;
        ctx.globalAlpha = 0.06 + Math.sin(t * 2 + i) * 0.03;
        ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(stx, sty); ctx.lineTo(stx - len, sty + len * 0.3); ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Title - "STICKMAN" with neon glow
    ctx.textAlign = 'center';
    ctx.font = 'bold 52px monospace';
    ctx.shadowColor = '#4488ff'; ctx.shadowBlur = 25;
    ctx.fillStyle = '#4488ff';
    ctx.fillText('STICKMAN', GW/2, 150);
    ctx.shadowBlur = 12; ctx.shadowColor = '#88bbff';
    ctx.fillStyle = '#ddeeff';
    ctx.fillText('STICKMAN', GW/2, 150);

    // "RUSH" with red glow + pulse
    const rushPulse = 1 + Math.sin(t * 3) * 0.025;
    ctx.save();
    ctx.translate(GW/2, 208);
    ctx.scale(rushPulse, rushPulse);
    ctx.font = 'bold 56px monospace';
    ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 30;
    ctx.fillStyle = '#ff2200';
    ctx.fillText('RUSH', 0, 0);
    ctx.shadowBlur = 12; ctx.shadowColor = '#ff6644';
    ctx.fillStyle = '#ff6644';
    ctx.fillText('RUSH', 0, 0);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffccaa';
    ctx.fillText('RUSH', 0, 0);
    ctx.restore();
    ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';

    // Stick figure
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    const sx = GW/2, sy = 275;
    ctx.beginPath(); ctx.arc(sx, sy - 25, 8, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx, sy - 17); ctx.lineTo(sx, sy + 5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx, sy + 5); ctx.lineTo(sx - 10, sy + 20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx, sy + 5); ctx.lineTo(sx + 10, sy + 20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx, sy - 12); ctx.lineTo(sx + 15, sy - 5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx, sy - 12); ctx.lineTo(sx - 12, sy - 2); ctx.stroke();
    // Gun flash glow
    ctx.shadowColor = '#ffff44'; ctx.shadowBlur = 12;
    ctx.fillStyle = '#ffff44';
    ctx.beginPath(); ctx.arc(sx + 18, sy - 6, 4 + Math.sin(t * 8) * 1, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
    // Muzzle rays
    ctx.globalAlpha = 0.25 + Math.sin(t * 6) * 0.1;
    ctx.strokeStyle = '#ffff44'; ctx.lineWidth = 1;
    for (let r = 0; r < 5; r++) {
        const ra = r * 0.7 - 1.4 + Math.sin(t * 10 + r) * 0.15;
        ctx.beginPath(); ctx.moveTo(sx + 18, sy - 6);
        ctx.lineTo(sx + 18 + Math.cos(ra) * 12, sy - 6 + Math.sin(ra) * 12);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Controls — two-column key/action layout
    const controlsList = [
        ['WASD / Arrows', 'Move & Jump'],
        ['Left Click', 'Shoot'],
        ['Right Click', 'Parry'],
        ['Shift', 'Dash'],
        ['M', 'Toggle Music'],
        ['ESC', 'Pause'],
    ];
    const colX = GW/2;
    const startY = 310;
    const rowH = 17;
    controlsList.forEach((c, i) => {
        const cy = startY + i * rowH;
        // Key (bold, bright)
        ctx.textAlign = 'right';
        ctx.font = 'bold 13px monospace';
        ctx.fillStyle = '#ddddef';
        ctx.fillText(c[0], colX - 14, cy);
        // Separator
        ctx.textAlign = 'center';
        ctx.fillStyle = '#555566';
        ctx.fillText('—', colX, cy);
        // Action (regular, dim)
        ctx.textAlign = 'left';
        ctx.font = '13px monospace';
        ctx.fillStyle = '#8888aa';
        ctx.fillText(c[1], colX + 14, cy);
    });
    ctx.textAlign = 'center';
    ctx.fillStyle = '#9999bb';
    ctx.font = 'italic 13px monospace';
    ctx.fillText('Survive 5 stages, defeat each boss!', GW/2, startY + controlsList.length * rowH + 8);

    // Start prompt
    const blink = Math.sin(t*3);
    ctx.shadowColor = '#ff4444'; ctx.shadowBlur = blink > 0 ? 8 : 0;
    ctx.fillStyle = blink > 0 ? '#fff' : '#aaa';
    ctx.font = 'bold 20px monospace';
    ctx.fillText('Click or Press ENTER to Start', GW/2, 455);
    ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
    if (hasBeatenGame) {
        ctx.fillStyle = '#ff884488';
        ctx.font = 'bold 14px monospace';
        ctx.fillText('Press N for New Game+', GW/2, 480);
    }
    if (hasBeatenNGPlus) {
        ctx.fillStyle = '#ff44ff88';
        ctx.font = 'bold 14px monospace';
        ctx.fillText('Press P for New Game++', GW/2, 500);
    }

    ctx.textAlign = 'left';
}

function drawBossType(cx, mx, sy, type, color, scale) {
    const s = scale || 1;
    const headR = 10*s, neckY = sy+headR*2+3*s, hipY = neckY+24*s, limb = 18*s;
    cx.lineCap = 'round';
    switch(type) {
    case 'thug':
        cx.fillStyle = '#333'; cx.beginPath(); cx.ellipse(mx, sy+headR-1, headR+3, 6, 0, Math.PI, 0); cx.fill();
        cx.fillStyle = color; cx.beginPath(); cx.arc(mx, sy+headR+1, headR, 0, Math.PI*2); cx.fill();
        cx.fillStyle = '#000'; cx.fillRect(mx-6, sy+headR-1, 4, 3); cx.fillRect(mx+2, sy+headR-1, 4, 3);
        cx.strokeStyle = color; cx.lineWidth = 6*s;
        cx.beginPath(); cx.moveTo(mx, neckY); cx.lineTo(mx, hipY); cx.stroke();
        cx.lineWidth = 4*s;
        cx.beginPath(); cx.moveTo(mx, neckY+4); cx.lineTo(mx+limb, neckY+limb*0.5); cx.stroke();
        cx.fillStyle = color; cx.beginPath(); cx.arc(mx+limb, neckY+limb*0.5, 5*s, 0, Math.PI*2); cx.fill();
        cx.beginPath(); cx.moveTo(mx, neckY+4); cx.lineTo(mx-limb*0.6, neckY+6); cx.stroke();
        cx.fillStyle = color; cx.beginPath(); cx.arc(mx-limb*0.6, neckY+6, 5*s, 0, Math.PI*2); cx.fill();
        cx.beginPath(); cx.moveTo(mx, hipY); cx.lineTo(mx+6*s, hipY+limb); cx.stroke();
        cx.beginPath(); cx.moveTo(mx, hipY); cx.lineTo(mx-6*s, hipY+limb); cx.stroke();
        break;
    case 'bandit':
        cx.fillStyle = '#3a2a1a'; cx.fillRect(mx-15*s, sy+3, 30*s, 5*s); cx.fillRect(mx-9*s, sy-5*s, 18*s, 10*s);
        cx.fillStyle = color; cx.beginPath(); cx.arc(mx, sy+headR+1, headR, 0, Math.PI*2); cx.fill();
        cx.fillStyle = '#886633'; cx.fillRect(mx-7*s, sy+headR*2-2, 14*s, 6*s);
        cx.strokeStyle = color; cx.lineWidth = 4*s;
        cx.beginPath(); cx.moveTo(mx, neckY); cx.lineTo(mx, hipY); cx.stroke();
        cx.lineWidth = 3.5*s;
        cx.beginPath(); cx.moveTo(mx, hipY); cx.lineTo(mx+8*s, hipY+limb); cx.stroke();
        cx.beginPath(); cx.moveTo(mx, hipY); cx.lineTo(mx-8*s, hipY+limb); cx.stroke();
        cx.lineWidth = 3*s;
        cx.beginPath(); cx.moveTo(mx, neckY+4); cx.lineTo(mx+limb, neckY); cx.stroke();
        cx.beginPath(); cx.moveTo(mx, neckY+4); cx.lineTo(mx+limb*0.4, neckY+limb*0.8); cx.stroke();
        break;
    case 'ninja':
        cx.fillStyle = color; cx.beginPath(); cx.arc(mx, sy+headR+1, headR, 0, Math.PI*2); cx.fill();
        cx.fillStyle = '#aabbcc'; cx.fillRect(mx-headR-2, sy+headR-2, headR*2+4, 3);
        cx.strokeStyle = '#aabbcc'; cx.lineWidth = 2;
        cx.beginPath(); cx.moveTo(mx-headR, sy+headR); cx.lineTo(mx-headR-14, sy+headR+12); cx.stroke();
        cx.beginPath(); cx.moveTo(mx-headR, sy+headR-1); cx.lineTo(mx-headR-11, sy+headR+16); cx.stroke();
        cx.strokeStyle = color; cx.lineWidth = 3*s;
        cx.beginPath(); cx.moveTo(mx, neckY); cx.lineTo(mx+3, hipY); cx.stroke();
        cx.lineWidth = 2.5*s;
        cx.beginPath(); cx.moveTo(mx, neckY+4); cx.lineTo(mx+limb, neckY-2); cx.stroke();
        cx.beginPath(); cx.moveTo(mx+3, hipY); cx.lineTo(mx+limb, hipY+limb); cx.stroke();
        cx.beginPath(); cx.moveTo(mx+3, hipY); cx.lineTo(mx-limb+3, hipY+limb); cx.stroke();
        break;
    case 'troll':
        cx.strokeStyle = '#667744'; cx.lineWidth = 3*s;
        cx.beginPath(); cx.moveTo(mx-7, sy+5); cx.lineTo(mx-14, sy-8); cx.stroke();
        cx.beginPath(); cx.moveTo(mx+7, sy+5); cx.lineTo(mx+14, sy-8); cx.stroke();
        cx.fillStyle = color; cx.beginPath(); cx.arc(mx, sy+headR+2, headR+4, 0, Math.PI*2); cx.fill();
        cx.strokeStyle = '#000'; cx.lineWidth = 2;
        cx.beginPath(); cx.moveTo(mx-8, sy+headR-1); cx.lineTo(mx-2, sy+headR+1); cx.stroke();
        cx.beginPath(); cx.moveTo(mx+8, sy+headR-1); cx.lineTo(mx+2, sy+headR+1); cx.stroke();
        cx.strokeStyle = color; cx.lineWidth = 8*s;
        cx.beginPath(); cx.moveTo(mx, neckY+2); cx.quadraticCurveTo(mx+10, neckY+14, mx, hipY); cx.stroke();
        cx.lineWidth = 5*s;
        cx.beginPath(); cx.moveTo(mx, neckY+6); cx.lineTo(mx+limb*1.2, neckY+limb*0.8); cx.stroke();
        cx.beginPath(); cx.moveTo(mx, hipY); cx.lineTo(mx+8, hipY+limb*0.8); cx.stroke();
        cx.beginPath(); cx.moveTo(mx, hipY); cx.lineTo(mx-8, hipY+limb*0.8); cx.stroke();
        break;
    case 'lord':
        cx.fillStyle = '#33005588';
        cx.beginPath(); cx.moveTo(mx-3, neckY); cx.lineTo(mx-22, hipY+limb+5); cx.lineTo(mx-5, hipY+limb); cx.lineTo(mx, neckY+5); cx.closePath(); cx.fill();
        cx.fillStyle = color; cx.beginPath(); cx.arc(mx, sy+headR+1, headR, 0, Math.PI*2); cx.fill();
        cx.fillStyle = '#cc44ff'; cx.beginPath();
        cx.moveTo(mx-headR, sy+5); cx.lineTo(mx-headR+3, sy-6); cx.lineTo(mx-headR+7, sy+3);
        cx.lineTo(mx, sy-9); cx.lineTo(mx+headR-7, sy+3); cx.lineTo(mx+headR-3, sy-6);
        cx.lineTo(mx+headR, sy+5); cx.closePath(); cx.fill();
        cx.fillStyle = '#ff44ff';
        cx.beginPath(); cx.arc(mx-4, sy+headR, 2.5, 0, Math.PI*2); cx.fill();
        cx.beginPath(); cx.arc(mx+4, sy+headR, 2.5, 0, Math.PI*2); cx.fill();
        cx.strokeStyle = color; cx.lineWidth = 4*s;
        cx.beginPath(); cx.moveTo(mx, neckY); cx.lineTo(mx, hipY); cx.stroke();
        cx.lineWidth = 3*s;
        cx.beginPath(); cx.moveTo(mx, neckY+4); cx.lineTo(mx+limb, neckY-2); cx.stroke();
        cx.strokeStyle = '#8844aa'; cx.lineWidth = 3;
        cx.beginPath(); cx.moveTo(mx+limb, neckY-22); cx.lineTo(mx+limb, neckY+14); cx.stroke();
        cx.fillStyle = '#ff44ff'; cx.beginPath(); cx.arc(mx+limb, neckY-24, 5, 0, Math.PI*2); cx.fill();
        cx.strokeStyle = color; cx.lineWidth = 3*s;
        cx.beginPath(); cx.moveTo(mx, hipY); cx.lineTo(mx+6, hipY+limb); cx.stroke();
        cx.beginPath(); cx.moveTo(mx, hipY); cx.lineTo(mx-6, hipY+limb); cx.stroke();
        break;
    }
}

function drawIntroCutscene() {
    const t = cutsceneTimer;
    const now = Date.now() / 1000;
    ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';

    if (t < 180) {
        // Scene 1: Peaceful evening
        const a = Math.min(1, t / 30);
        ctx.globalAlpha = a;

        // Sky gradient - deep blue to purple-blue
        const sky = ctx.createLinearGradient(0, 0, 0, 400);
        sky.addColorStop(0, '#0b0b2e');
        sky.addColorStop(0.4, '#151545');
        sky.addColorStop(0.7, '#2a2060');
        sky.addColorStop(1, '#3a2868');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, GW, 400);

        // Moon with soft glow
        const moonX = 780, moonY = 80;
        ctx.save();
        ctx.shadowBlur = 60;
        ctx.shadowColor = '#aabbff';
        ctx.fillStyle = '#dde8ff';
        ctx.beginPath(); ctx.arc(moonX, moonY, 30, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
        ctx.restore();
        // Moon outer glow rings
        for (let r = 0; r < 3; r++) {
            ctx.fillStyle = `rgba(170,190,255,${0.04 - r * 0.012})`;
            ctx.beginPath(); ctx.arc(moonX, moonY, 50 + r * 25, 0, Math.PI * 2); ctx.fill();
        }

        // Twinkling stars
        for (let i = 0; i < 30; i++) {
            const sx = 50 + ((i * 137 + 29) % 860);
            const sy = 15 + ((i * 53 + 7) % 120);
            const twinkle = 0.3 + 0.7 * Math.abs(Math.sin(now * (1.2 + i * 0.3) + i * 2.1));
            const sz = 1 + ((i * 7) % 3);
            ctx.globalAlpha = a * twinkle;
            ctx.fillStyle = '#fff';
            ctx.fillRect(sx, sy, sz, sz);
        }
        ctx.globalAlpha = a;

        // Ground with grass texture variation
        const groundGrad = ctx.createLinearGradient(0, 395, 0, GH);
        groundGrad.addColorStop(0, '#2e5a2e');
        groundGrad.addColorStop(0.15, '#264a26');
        groundGrad.addColorStop(1, '#1a3a1a');
        ctx.fillStyle = groundGrad;
        ctx.fillRect(0, 395, GW, GH - 395);
        // Grass blades at horizon
        ctx.strokeStyle = '#3a6a3a';
        ctx.lineWidth = 1;
        for (let i = 0; i < 40; i++) {
            const gx = i * 24 + ((i * 13) % 12);
            ctx.beginPath();
            ctx.moveTo(gx, 395);
            ctx.lineTo(gx + (i % 2 === 0 ? 3 : -3), 388 + (i % 3) * 2);
            ctx.stroke();
        }

        // Path / road for the couple
        ctx.fillStyle = '#3d3528';
        ctx.fillRect(0, 405, GW, 14);
        ctx.fillStyle = '#4a4030';
        for (let i = 0; i < 16; i++) {
            ctx.fillRect(20 + i * 62, 410, 25, 3);
        }

        // Houses
        const houses = [{x:100,y:340,w:80,h:60},{x:300,y:350,w:70,h:50},{x:550,y:330,w:90,h:70},{x:750,y:345,w:75,h:55}];
        const roofs = [{ax:90,ay:340,bx:140,by:300,cx:190,cy:340},{ax:290,ay:350,bx:335,by:315,cx:380,cy:350},{ax:540,ay:330,bx:595,by:285,cx:650,cy:330},{ax:740,ay:345,bx:787,by:310,cx:835,cy:345}];
        for (let i = 0; i < houses.length; i++) {
            const h = houses[i];
            ctx.fillStyle = '#554433';
            ctx.fillRect(h.x, h.y, h.w, h.h);
            const rf = roofs[i];
            ctx.fillStyle = '#663322';
            ctx.beginPath(); ctx.moveTo(rf.ax, rf.ay); ctx.lineTo(rf.bx, rf.by); ctx.lineTo(rf.cx, rf.cy); ctx.fill();
        }
        // Windows with warm glow
        const wins = [[120,355],[150,355],[320,365],[570,345],[610,345],[770,360]];
        for (const w of wins) {
            ctx.save();
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#ffcc44';
            ctx.fillStyle = 'rgba(255,238,100,0.55)';
            ctx.fillRect(w[0], w[1], 15, 12);
            ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
            ctx.restore();
        }

        // Lamp posts with warm glow
        const lamps = [250, 480, 700];
        for (const lx of lamps) {
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(lx, 395); ctx.lineTo(lx, 355); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(lx, 355); ctx.lineTo(lx + 8, 355); ctx.stroke();
            // Lamp glow
            const lampGlow = ctx.createRadialGradient(lx + 8, 355, 2, lx + 8, 365, 40);
            lampGlow.addColorStop(0, 'rgba(255,180,60,0.35)');
            lampGlow.addColorStop(0.5, 'rgba(255,150,40,0.12)');
            lampGlow.addColorStop(1, 'rgba(255,120,20,0)');
            ctx.fillStyle = lampGlow;
            ctx.fillRect(lx - 35, 325, 80, 80);
            // Lamp bulb
            ctx.fillStyle = '#ffcc55';
            ctx.beginPath(); ctx.arc(lx + 8, 356, 3, 0, Math.PI * 2); ctx.fill();
        }

        // Fireflies / warm floating particles
        for (let i = 0; i < 20; i++) {
            const fx = 80 + ((i * 197 + 31) % 800);
            const fy = 300 + ((i * 73 + 11) % 90);
            const fAlpha = 0.15 + 0.35 * Math.abs(Math.sin(now * (0.8 + i * 0.2) + i * 3.7));
            const fOff = Math.sin(now * 0.6 + i * 1.5) * 8;
            ctx.fillStyle = `rgba(255,230,100,${fAlpha})`;
            ctx.beginPath(); ctx.arc(fx, fy + fOff, 2, 0, Math.PI * 2); ctx.fill();
        }

        // Player and girlfriend walking with bobbing
        const px = 350 + t * 0.8;
        const bob = Math.sin(now * 3.5) * 2;
        drawStickSimple(ctx, px, 370 + bob, '#ffffff');
        drawGirlfriend(ctx, px + 30, 370 - bob * 0.5);

        // Heart with pulse
        const heartScale = 1 + 0.15 * Math.sin(now * 2.5);
        ctx.save();
        ctx.translate(px + 15, 356);
        ctx.scale(heartScale, heartScale);
        ctx.fillStyle = '#ff4466';
        ctx.font = '16px monospace';
        ctx.fillText('♥', 0, 0);
        ctx.restore();

        // Text with fade-in
        ctx.fillStyle = `rgba(255,255,255,${Math.min(0.85, t / 60)})`;
        ctx.font = 'italic 18px monospace';
        ctx.fillText('A peaceful evening... or so he thought.', GW / 2, 50);

        ctx.globalAlpha = 1;
    } else if (t < 360) {
        // Scene 2: Villains appear
        const st = t - 180;
        const shake = st > 30 ? Math.sin(now * 25) * 2.5 * Math.min(1, (st - 30) / 60) : 0;

        ctx.save();
        ctx.translate(0, shake);

        // Dramatic red/orange sky gradient
        const sky2 = ctx.createLinearGradient(0, 0, 0, 400);
        sky2.addColorStop(0, '#1a0505');
        sky2.addColorStop(0.3, '#2d0a08');
        sky2.addColorStop(0.6, '#3a1510');
        sky2.addColorStop(1, '#4a1a0a');
        ctx.fillStyle = sky2;
        ctx.fillRect(0, 0, GW, 400);

        // Lightning flash
        const flashCycle = (st % 90);
        if (flashCycle > 70 && flashCycle < 74) {
            ctx.fillStyle = `rgba(255,255,255,${0.3 * (1 - (flashCycle - 70) / 4)})`;
            ctx.fillRect(0, 0, GW, GH);
        }

        // Ground with cracks
        ctx.fillStyle = '#2a1a1a';
        ctx.fillRect(0, 395, GW, GH - 395);
        // Crack lines
        ctx.strokeStyle = '#1a0a0a';
        ctx.lineWidth = 1.5;
        const cracks = [[100,410,140,430,180,420],[300,400,340,425,380,415],[500,405,530,435,570,420],[700,400,750,430,780,410]];
        for (const c of cracks) {
            ctx.beginPath(); ctx.moveTo(c[0],c[1]); ctx.lineTo(c[2],c[3]); ctx.lineTo(c[4],c[5]); ctx.stroke();
        }

        // Damaged houses
        ctx.fillStyle = '#443322';
        ctx.fillRect(100, 340, 80, 60);
        ctx.fillRect(550, 330, 90, 70);

        // Multi-layer fire
        for (let i = 0; i < 15; i++) {
            const fx = 80 + i * 60 + Math.sin(now * 3 + i) * 5;
            const fy = 380 + Math.sin(now * 4 + i * 1.3) * 12;
            const fr = 6 + Math.sin(now * 5 + i * 0.7) * 4;
            // Outer fire glow
            ctx.fillStyle = `rgba(255,60,0,${0.15 + 0.1 * Math.sin(now * 3 + i)})`;
            ctx.beginPath(); ctx.arc(fx, fy - 5, fr + 8, 0, Math.PI * 2); ctx.fill();
            // Core fire
            ctx.fillStyle = i % 3 === 0 ? `rgba(255,200,50,0.6)` : `rgba(255,100,20,0.5)`;
            ctx.beginPath(); ctx.arc(fx, fy, fr, 0, Math.PI * 2); ctx.fill();
        }

        // Smoke/haze particles
        for (let i = 0; i < 15; i++) {
            const smx = 60 + ((i * 173) % 840);
            const smy = 250 + Math.sin(now * 0.4 + i * 2) * 30 - st * 0.15;
            const smAlpha = 0.06 + 0.04 * Math.sin(now * 0.5 + i);
            ctx.fillStyle = `rgba(80,40,30,${smAlpha})`;
            ctx.beginPath(); ctx.arc(smx, smy, 25 + Math.sin(now + i) * 8, 0, Math.PI * 2); ctx.fill();
        }

        // Red glow/haze behind bosses
        const bossX = Math.max(GW / 2 + 50, GW - st * 3);
        const hazeGrad = ctx.createRadialGradient(bossX + 80, 360, 20, bossX + 80, 360, 200);
        hazeGrad.addColorStop(0, 'rgba(200,30,30,0.25)');
        hazeGrad.addColorStop(0.5, 'rgba(150,20,20,0.1)');
        hazeGrad.addColorStop(1, 'rgba(100,10,10,0)');
        ctx.fillStyle = hazeGrad;
        ctx.fillRect(bossX - 120, 200, 400, 300);

        // Bosses entering from right
        drawBossType(ctx, bossX, 355, 'lord', '#cc44ff', 1.2);
        drawBossType(ctx, bossX + 70, 365, 'thug', '#ff4444', 0.8);
        drawBossType(ctx, bossX + 120, 365, 'bandit', '#cc8800', 0.8);
        drawBossType(ctx, bossX + 170, 365, 'ninja', '#4488ff', 0.8);
        drawBossType(ctx, bossX + 210, 362, 'troll', '#88aa44', 0.8);

        // Player on left
        drawStickSimple(ctx, 200, 365, '#ffffff');
        drawGirlfriend(ctx, 230, 365);

        ctx.restore();

        // Villain text with red glow
        ctx.save();
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#ff2200';
        ctx.fillStyle = '#ff3333dd';
        ctx.font = 'bold 16px monospace';
        ctx.fillText('"Your city is OURS now. Hand her over."', GW / 2, 50);
        ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
        ctx.restore();

    } else if (t < 540) {
        // Scene 3: Girlfriend captured
        const st = t - 360;

        // Dark atmosphere
        ctx.fillStyle = '#0e0205';
        ctx.fillRect(0, 0, GW, GH);

        // Ground
        ctx.fillStyle = '#2a1a1a';
        ctx.fillRect(0, 395, GW, GH - 395);

        // Rain effect
        ctx.strokeStyle = 'rgba(150,170,200,0.25)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 40; i++) {
            const rx = ((i * 131 + Math.floor(now * 120)) % (GW + 40)) - 20;
            const ry = ((i * 97 + Math.floor(now * 200 + i * 50)) % (GH + 30)) - 15;
            ctx.beginPath();
            ctx.moveTo(rx, ry);
            ctx.lineTo(rx - 2, ry + 12);
            ctx.stroke();
        }

        // Intense fire with ember particles
        for (let i = 0; i < 15; i++) {
            const fx = 40 + i * 65;
            const fy = 375 + Math.sin(now * 4.5 + i * 1.1) * 12;
            const fr = 10 + Math.sin(now * 5 + i) * 6;
            ctx.fillStyle = `rgba(255,80,0,${0.3 + 0.15 * Math.sin(now * 3.5 + i)})`;
            ctx.beginPath(); ctx.arc(fx, fy, fr + 6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = `rgba(255,180,40,${0.45 + 0.2 * Math.sin(now * 4 + i)})`;
            ctx.beginPath(); ctx.arc(fx, fy, fr * 0.6, 0, Math.PI * 2); ctx.fill();
        }
        // Rising ember particles
        for (let i = 0; i < 20; i++) {
            const ex = 60 + ((i * 149) % 840);
            const ey = 390 - ((now * 40 + i * 37) % 200);
            const eAlpha = Math.max(0, 0.6 - ((390 - ey) / 200) * 0.6);
            ctx.fillStyle = `rgba(255,${140 + (i % 4) * 30},20,${eAlpha})`;
            ctx.beginPath(); ctx.arc(ex + Math.sin(now * 2 + i) * 5, ey, 1.5, 0, Math.PI * 2); ctx.fill();
        }

        // Dark Lord carrying girlfriend away
        const lordX = GW / 2 + st * 2;
        const lordY = 330 - st * 0.3;
        drawBossType(ctx, lordX, lordY, 'lord', '#cc44ff', 1.2);
        drawGirlfriend(ctx, lordX + 20, lordY + 15);

        // Speed lines as lord escapes — trailing energy wisps
        for (let i = 0; i < 6; i++) {
            const wt = (now * 3 + i * 1.2) % 2;
            const wLen = 20 + wt * 40;
            const wAlpha = Math.max(0, 0.35 - wt * 0.18);
            const wy = lordY + i * 8 - 15;
            const wx = lordX - 30 - wt * 60;
            const wGrad = ctx.createLinearGradient(wx, wy, wx - wLen, wy);
            wGrad.addColorStop(0, `rgba(200,80,255,${wAlpha})`);
            wGrad.addColorStop(1, 'rgba(200,80,255,0)');
            ctx.strokeStyle = wGrad;
            ctx.lineWidth = 2 - wt * 0.5;
            ctx.beginPath();
            ctx.moveTo(wx, wy);
            ctx.quadraticCurveTo(wx - wLen * 0.5, wy + Math.sin(now * 4 + i) * 4, wx - wLen, wy);
            ctx.stroke();
        }
        // Fading afterimage ghosts
        for (let g = 1; g <= 3; g++) {
            ctx.globalAlpha = 0.12 - g * 0.03;
            drawBossType(ctx, lordX - g * 35, lordY + g * 2, 'lord', '#cc44ff', 1.2);
            ctx.globalAlpha = 1;
        }

        // Lord's exclamation
        ctx.fillStyle = '#ff66aa';
        ctx.font = '14px monospace';
        ctx.fillText('"Help me!!!"', lordX + 10, lordY - 10);

        // Player left behind
        drawStickSimple(ctx, 200, 365, '#ffffff');

        // Pulsing exclamation text
        const exclPulse = 1 + 0.08 * Math.sin(now * 6);
        ctx.save();
        ctx.translate(200, 345);
        ctx.scale(exclPulse, exclPulse);
        ctx.fillStyle = '#ffffffdd';
        ctx.font = 'bold 20px monospace';
        ctx.fillText('"No!!!"', 0, 0);
        ctx.restore();

        // Bosses blocking
        drawBossType(ctx, 380, 365, 'thug', '#ff4444', 0.8);
        drawBossType(ctx, 430, 365, 'bandit', '#cc8800', 0.8);
        drawBossType(ctx, 480, 365, 'ninja', '#4488ff', 0.8);
        drawBossType(ctx, 530, 362, 'troll', '#88aa44', 0.8);

        // Red vignette around edges
        const vigL = ctx.createLinearGradient(0, 0, 120, 0);
        vigL.addColorStop(0, 'rgba(120,0,0,0.45)');
        vigL.addColorStop(1, 'rgba(120,0,0,0)');
        ctx.fillStyle = vigL;
        ctx.fillRect(0, 0, 120, GH);
        const vigR = ctx.createLinearGradient(GW, 0, GW - 120, 0);
        vigR.addColorStop(0, 'rgba(120,0,0,0.45)');
        vigR.addColorStop(1, 'rgba(120,0,0,0)');
        ctx.fillStyle = vigR;
        ctx.fillRect(GW - 120, 0, 120, GH);
        const vigT = ctx.createLinearGradient(0, 0, 0, 80);
        vigT.addColorStop(0, 'rgba(120,0,0,0.4)');
        vigT.addColorStop(1, 'rgba(120,0,0,0)');
        ctx.fillStyle = vigT;
        ctx.fillRect(0, 0, GW, 80);
        const vigB = ctx.createLinearGradient(0, GH, 0, GH - 80);
        vigB.addColorStop(0, 'rgba(80,0,0,0.4)');
        vigB.addColorStop(1, 'rgba(80,0,0,0)');
        ctx.fillStyle = vigB;
        ctx.fillRect(0, GH - 80, GW, 80);

    } else {
        // Scene 4: Player's resolve
        const st = t - 540;
        const fadeIn = Math.min(1, st / 40);

        // Dark dramatic sky
        const sky4 = ctx.createLinearGradient(0, 0, 0, GH);
        sky4.addColorStop(0, '#050515');
        sky4.addColorStop(0.5, '#0a0a2e');
        sky4.addColorStop(1, '#111133');
        ctx.fillStyle = sky4;
        ctx.fillRect(0, 0, GW, GH);

        // Ground with mist
        ctx.fillStyle = '#181828';
        ctx.fillRect(0, 430, GW, 110);

        // Ground-level mist/fog
        for (let i = 0; i < 20; i++) {
            const mx = ((i * 163 + Math.floor(now * 15)) % (GW + 100)) - 50;
            const my = 435 + ((i * 31) % 40);
            const mAlpha = 0.04 + 0.03 * Math.sin(now * 0.7 + i * 2.3);
            ctx.fillStyle = `rgba(150,150,200,${mAlpha * fadeIn})`;
            ctx.beginPath(); ctx.arc(mx, my, 35 + Math.sin(now * 0.5 + i) * 10, 0, Math.PI * 2); ctx.fill();
        }

        // Dramatic beam of light from above (cone expanding downward)
        const beamAlpha = 0.08 + 0.03 * Math.sin(now * 1.5);
        const beamWidth = 30 + st * 0.3;
        ctx.fillStyle = `rgba(200,210,255,${beamAlpha * fadeIn})`;
        ctx.beginPath();
        ctx.moveTo(GW / 2 - 80 - beamWidth * 0.2, 0);
        ctx.lineTo(GW / 2 + 80 + beamWidth * 0.2, 0);
        ctx.lineTo(GW / 2 + 80 + beamWidth, 430);
        ctx.lineTo(GW / 2 - 80 - beamWidth, 430);
        ctx.closePath();
        ctx.fill();

        // Inner brighter beam
        ctx.fillStyle = `rgba(220,225,255,${beamAlpha * 0.6 * fadeIn})`;
        ctx.beginPath();
        ctx.moveTo(GW / 2 - 30 - beamWidth * 0.05, 0);
        ctx.lineTo(GW / 2 + 30 + beamWidth * 0.05, 0);
        ctx.lineTo(GW / 2 + 50 + beamWidth * 0.3, 430);
        ctx.lineTo(GW / 2 - 50 - beamWidth * 0.3, 430);
        ctx.closePath();
        ctx.fill();

        // Pulsing aura around player
        const playerX = GW / 2 - 60;
        const auraR = 50 + 10 * Math.sin(now * 2);
        const auraGrad = ctx.createRadialGradient(playerX, 395, 10, playerX, 395, auraR);
        auraGrad.addColorStop(0, `rgba(180,200,255,${0.15 * fadeIn})`);
        auraGrad.addColorStop(0.5, `rgba(140,160,255,${0.06 * fadeIn})`);
        auraGrad.addColorStop(1, 'rgba(100,120,255,0)');
        ctx.fillStyle = auraGrad;
        ctx.beginPath(); ctx.arc(playerX, 395, auraR, 0, Math.PI * 2); ctx.fill();

        // Player slightly left of center, looking right
        ctx.globalAlpha = fadeIn;
        drawStickSimple(ctx, playerX, 395, '#ffffff', 1.2);
        ctx.globalAlpha = 1;

        // Wind particles blowing across
        for (let i = 0; i < 15; i++) {
            const wx = ((now * 60 + i * 127) % (GW + 60)) - 30;
            const wy = 200 + ((i * 89) % 280);
            const wAlpha = 0.12 + 0.08 * Math.sin(now + i * 1.7);
            ctx.strokeStyle = `rgba(180,190,220,${wAlpha * fadeIn})`;
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(wx, wy);
            ctx.lineTo(wx + 15 + Math.sin(now * 2 + i) * 5, wy + Math.sin(now * 3 + i) * 2);
            ctx.stroke();
        }

        // Dialogue text
        ctx.globalAlpha = fadeIn;
        ctx.fillStyle = '#ffffffdd';
        ctx.font = 'bold 22px monospace';
        ctx.fillText('"They\'ll pay for this. Every. Last. One."', GW / 2, 100);
        ctx.globalAlpha = 1;

        // Prompt text
        const promptAlpha = 0.5 + 0.5 * Math.sin(now * 2.5);
        ctx.fillStyle = `rgba(255,255,255,${promptAlpha})`;
        ctx.font = '16px monospace';
        ctx.fillText('Click or Press ENTER to begin', GW / 2, GH - 50);
    }
    ctx.textAlign = 'left';
}

function drawEndingCutscene() {
    const t = cutsceneTimer;
    const tt = Date.now() / 1000;
    ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';

    if (t < 210) {
        // Scene 1: Kingpin Defeated — dramatic explosion aftermath
        const a = Math.min(1, t / 30);
        ctx.globalAlpha = a;
        const bg = ctx.createLinearGradient(0, 0, 0, GH);
        bg.addColorStop(0, '#0a0515'); bg.addColorStop(0.6, '#1a0a2a'); bg.addColorStop(1, '#2a1a3a');
        ctx.fillStyle = bg; ctx.fillRect(0, 0, GW, GH);
        // Screen flash at start
        if (t < 15) {
            ctx.fillStyle = 'rgba(255,255,255,' + ((1 - t / 15) * 0.8) + ')';
            ctx.fillRect(0, 0, GW, GH);
        }
        // Ground
        ctx.fillStyle = '#2a1a3a'; ctx.fillRect(0, 420, GW, 120);
        // Smoke wisps rising
        for (let i = 0; i < 8; i++) {
            const sx = GW/2 + 100 + Math.sin(i * 2.1) * 80;
            const smokePhase = (tt * 20 + i * 40) % 100;
            const smokeY = 420 - smokePhase;
            ctx.fillStyle = 'rgba(150,100,200,' + (Math.max(0, 1 - smokePhase / 100) * 0.3) + ')';
            ctx.beginPath();
            ctx.arc(sx + Math.sin(tt + i) * 8, smokeY, 8 + Math.sin(tt * 0.5 + i) * 3, 0, Math.PI * 2);
            ctx.fill();
        }
        // Dust clouds dissipating
        const dustFade = Math.max(0, 1 - t / 120);
        for (let i = 0; i < 10; i++) {
            ctx.fillStyle = 'rgba(100,60,120,' + (dustFade * 0.25) + ')';
            ctx.beginPath();
            ctx.arc(GW/2 + 100 + Math.cos(i * 1.7) * (60 + t * 0.5), 400 + Math.sin(i * 2.3) * 30, 15 + t * 0.08, 0, Math.PI * 2);
            ctx.fill();
        }
        // Debris particles floating and settling
        for (let i = 0; i < 20; i++) {
            const seed = i * 137.5;
            const debrisX = GW/2 + 100 + Math.cos(seed) * (40 + t * 0.3) + Math.sin(tt * 0.8 + i) * 5;
            const rawY = 380 - Math.max(0, (80 - t * 0.5)) * Math.sin(seed * 0.5) + t * 0.3 * Math.abs(Math.sin(seed));
            const debrisA = Math.max(0, 1 - t / 180) * 0.7;
            const colors = ['rgba(200,50,255,' + debrisA + ')', 'rgba(255,200,50,' + debrisA + ')', 'rgba(180,140,200,' + debrisA + ')'];
            ctx.fillStyle = colors[i % 3];
            ctx.fillRect(debrisX, Math.min(rawY, 418), 2 + (i % 3), 2 + (i % 2));
        }
        // Explosion aftermath energy ring
        for (let i = 0; i < 15; i++) {
            const ea = (i / 15) * Math.PI * 2 + t * 0.05;
            const er = 30 + t * 0.3;
            const eAlpha = Math.max(0.1, 0.5 - t / 400);
            ctx.fillStyle = i % 2 === 0 ? 'rgba(204,34,255,' + eAlpha + ')' : 'rgba(255,255,0,' + eAlpha + ')';
            ctx.beginPath();
            ctx.arc(GW/2 + 100 + Math.cos(ea) * er, 380 + Math.sin(ea) * er * 0.5, 4 + Math.sin(tt + i) * 2, 0, Math.PI * 2);
            ctx.fill();
        }
        // Spotlight on player
        const spotGrad = ctx.createRadialGradient(GW/2 - 50, 385, 10, GW/2 - 50, 385, 120);
        spotGrad.addColorStop(0, 'rgba(255,255,200,0.15)'); spotGrad.addColorStop(1, 'rgba(255,255,200,0)');
        ctx.fillStyle = spotGrad; ctx.fillRect(GW/2 - 170, 265, 240, 255);
        // Fallen boss
        ctx.save(); ctx.translate(GW/2 + 100, 420); ctx.rotate(Math.PI / 2);
        drawStickSimple(ctx, 0, 0, '#cc22ff66', 1.3);
        ctx.restore();
        // Hero standing victorious
        drawStickSimple(ctx, GW/2 - 50, 385, '#ffffff', 1.2);
        // Text with glow
        ctx.shadowColor = '#cc22ff'; ctx.shadowBlur = 15;
        ctx.fillStyle = '#ffffffee'; ctx.font = 'bold 22px monospace';
        ctx.fillText('The Kingpin has fallen!', GW/2, 60);

            for (let i = 0; i < 30; i++) {
                const starAlpha = nightProgress * (0.3 + Math.sin(tt * 1.5 + i * 2.3) * 0.3);
                ctx.fillStyle = 'rgba(255,255,255,' + Math.max(0, starAlpha) + ')';
                ctx.beginPath(); ctx.arc((i * 137.5 + 40) % GW, 10 + ((i * 89 + 15) % 150), 1 + (i % 3) * 0.3, 0, Math.PI * 2); ctx.fill();
            }
            // Ground — training yard
            ctx.fillStyle = '#2a5a2a'; ctx.fillRect(0, 420, GW, 120);
            ctx.strokeStyle = 'rgba(255,255,200,0.08)'; ctx.lineWidth = 2;
            // Training post
            ctx.fillStyle = '#665544'; ctx.fillRect(GW/2 + 30, 390, 6, 30);
            ctx.fillStyle = '#887766'; ctx.beginPath(); ctx.arc(GW/2 + 33, 386, 6, 0, Math.PI * 2); ctx.fill();
            // Proud parent watching
            drawStickSimple(ctx, GW/2 - 70, 382, '#ffffff', 1.0);
            drawGirlfriend(ctx, GW/2 + 90, 382);
            // Small child practicing
            ctx.fillStyle = '#88ccff'; ctx.strokeStyle = '#88ccff'; ctx.lineWidth = 2; ctx.lineCap = 'round';
            const kidX = GW/2 - 10, kidY = 395;
            ctx.beginPath(); ctx.arc(kidX, kidY, 5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(kidX, kidY + 6); ctx.lineTo(kidX, kidY + 18); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(kidX, kidY + 18); ctx.lineTo(kidX - 5, kidY + 27); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(kidX, kidY + 18); ctx.lineTo(kidX + 5, kidY + 27); ctx.stroke();
            const kidArm = Math.sin(tt * 3) * 0.4;
            ctx.beginPath(); ctx.moveTo(kidX, kidY + 10); ctx.lineTo(kidX + Math.cos(kidArm) * 12, kidY + 10 + Math.sin(kidArm) * 12); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(kidX, kidY + 10); ctx.lineTo(kidX - 6, kidY + 16); ctx.stroke();
            // Practice sword tip
            ctx.fillStyle = '#ffff44';
            ctx.beginPath(); ctx.arc(kidX + Math.cos(kidArm) * 15, kidY + 10 + Math.sin(kidArm) * 15, 2, 0, Math.PI * 2); ctx.fill();
            // Sparks from practice swings
            if (Math.abs(Math.sin(tt * 3)) < 0.3) {
                for (let i = 0; i < 8; i++) {
                    const sa = (i / 8) * Math.PI * 2 + tt * 5;
                    const sr = 5 + Math.abs(Math.sin(tt * 7 + i * 3.7)) * 15;
                    ctx.fillStyle = 'rgba(255,255,100,' + Math.max(0, 0.7 - sr / 20) + ')';
                    ctx.beginPath(); ctx.arc(kidX + Math.cos(kidArm) * 15 + Math.cos(sa) * sr, kidY + 10 + Math.sin(kidArm) * 15 + Math.sin(sa) * sr, 1, 0, Math.PI * 2); ctx.fill();
                }
            }
            ctx.fillStyle = '#ff4466'; ctx.font = '16px monospace';
            ctx.fillText('\u2665', GW/2 + 10, 370);
            ctx.shadowColor = '#aaaaff'; ctx.shadowBlur = 10;
            ctx.fillStyle = '#ffffffdd'; ctx.font = 'bold 20px monospace';
            ctx.fillText('"The legacy continues..."', GW/2, 50);
            ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
            ctx.fillStyle = '#bbbbdd'; ctx.font = 'italic 14px monospace';
            ctx.fillText('Thank you for completing the ultimate challenge.', GW/2, 290);
        }
    } else {
        // Final THE END screen — grand finale
        ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, GW, GH);
        // Warm background glow
        const bgGlow = ctx.createRadialGradient(GW/2, GH/2, 50, GW/2, GH/2, 400);
        bgGlow.addColorStop(0, 'rgba(60,40,20,0.4)'); bgGlow.addColorStop(0.5, 'rgba(30,20,40,0.2)');
        bgGlow.addColorStop(1, 'rgba(10,10,26,0)');
        ctx.fillStyle = bgGlow; ctx.fillRect(0, 0, GW, GH);
        // Expanding golden rings
        for (let i = 0; i < 4; i++) {
            const ringPhase = (tt * 0.3 + i * 0.75) % 3;
            ctx.strokeStyle = 'rgba(255,200,50,' + Math.max(0, 0.3 - ringPhase * 0.1) + ')';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(GW/2, 300, ringPhase * 150, 0, Math.PI * 2); ctx.stroke();
        }
        // Gold sparkles in spiral pattern
        for (let i = 0; i < 30; i++) {
            const spiralAngle = tt * 0.5 + (i / 30) * Math.PI * 4;
            const spiralR = 80 + i * 5 + Math.sin(tt + i * 0.5) * 20;
            const sparkle = 0.2 + Math.sin(tt * 3 + i * 1.3) * 0.2;
            ctx.fillStyle = 'rgba(255,' + (200 + (i%3)*20) + ',' + (50 + (i%4)*30) + ',' + sparkle + ')';
            ctx.beginPath(); ctx.arc(GW/2 + Math.cos(spiralAngle) * spiralR, 280 + Math.sin(spiralAngle) * spiralR * 0.4, 1.5 + Math.sin(tt * 2 + i) * 0.5, 0, Math.PI * 2); ctx.fill();
        }
        // Subtle firework bursts in background
        for (let i = 0; i < 3; i++) {
            const fbTime = (tt * 0.4 + i * 1.1) % 4;
            if (fbTime < 1.5) {
                const fbx = 150 + ((i * 311) % 660), fby = 80 + ((i * 197) % 150);
                const fbProg = fbTime / 1.5, fbAlpha = Math.max(0, 0.4 - fbProg * 0.3);
                for (let j = 0; j < 8; j++) {
                    const fa = (j / 8) * Math.PI * 2;
                    ctx.fillStyle = 'hsla(' + ((i * 120 + 40) % 360) + ',70%,60%,' + fbAlpha + ')';
                    ctx.beginPath(); ctx.arc(fbx + Math.cos(fa) * fbProg * 30, fby + Math.sin(fa) * fbProg * 30, 1.5, 0, Math.PI * 2); ctx.fill();
                }
            }
        }
        // Confetti
        for (let i = 0; i < 20; i++) {
            ctx.save();
            ctx.translate(((tt * 20 + i * 50) % (GW + 20)) - 10, ((tt * 35 + i * 45) % (GH - 80)) + 40);
            ctx.rotate(tt * 2 + i * 1.3);
            ctx.fillStyle = 'hsla(' + ((i * 51) % 360) + ',70%,60%,' + (0.25 + Math.sin(tt + i) * 0.1) + ')';
            ctx.fillRect(-2, -1, 4, 2);
            ctx.restore();
        }
        // Warm glow behind characters
        const charGlow = ctx.createRadialGradient(GW/2, 300, 10, GW/2, 300, 60);
        charGlow.addColorStop(0, 'rgba(255,180,100,0.15)'); charGlow.addColorStop(1, 'rgba(255,150,50,0)');
        ctx.fillStyle = charGlow; ctx.beginPath(); ctx.arc(GW/2, 300, 60, 0, Math.PI * 2); ctx.fill();
        drawStickSimple(ctx, GW/2 - 15, 300, '#ffffff');
        drawGirlfriend(ctx, GW/2 + 15, 300);
        // Heart with glow
        ctx.shadowColor = '#ff4466'; ctx.shadowBlur = 15;
        ctx.fillStyle = '#ff4466'; ctx.font = (20 + Math.sin(tt * 2) * 2) + 'px monospace';
        ctx.fillText('\u2665', GW/2, 285);
        ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
        // Title with golden glow and shadow
        const titleText = newGamePlus === 2 ? 'ULTIMATE ENDING' : (newGamePlus === 1 ? 'TRUE ENDING' : 'THE END');
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.font = 'bold 48px monospace';
        ctx.fillText(titleText, GW/2 + 3, 163);
        ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 25;
        ctx.fillStyle = '#ffcc00';
        ctx.fillText(titleText, GW/2, 160);
        ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
        if (newGamePlus === 2) {
            ctx.shadowColor = '#ff44ff'; ctx.shadowBlur = 8;
            ctx.fillStyle = '#ff44ff'; ctx.font = 'bold 16px monospace';
            ctx.fillText('\u2605\u2605 New Game++ Complete \u2605\u2605', GW/2, 195);
            ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
        } else if (newGamePlus === 1) {
            ctx.shadowColor = '#ff66aa'; ctx.shadowBlur = 8;
            ctx.fillStyle = '#ff66aa'; ctx.font = 'bold 16px monospace';
            ctx.fillText('\u2605 New Game+ Complete \u2605', GW/2, 195);
            ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
        }
        ctx.shadowColor = '#ffcc44'; ctx.shadowBlur = 10;
        ctx.fillStyle = '#ffcc44'; ctx.font = 'bold 22px monospace';
        ctx.fillText('Final Score: ' + score, GW/2, 390);
        ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
        const pulseAlpha = 0.6 + Math.sin(tt * 3) * 0.4;
        ctx.fillStyle = 'rgba(255,255,255,' + pulseAlpha + ')';
        ctx.font = '14px monospace';
        if (newGamePlus === 0) {
            ctx.fillText('ENTER - Menu    N - New Game+', GW/2, 435);
        } else if (newGamePlus === 1) {
            ctx.fillText('ENTER - Menu    P - New Game++', GW/2, 435);
        } else {
            ctx.fillText('Press ENTER for Menu', GW/2, 435);
        }
    }
    ctx.textAlign = 'left';
}

// ======================== RENDER ========================
function render() {
    ctx.save();
    // Screen shake
    if (shake > 0) {
        ctx.translate(rand(-shake, shake), rand(-shake, shake));
    }

    if (gameState === 'menu') {
        drawMenu();
    } else if (gameState === 'intro') {
        drawIntroCutscene();
    } else if (gameState === 'ending') {
        drawEndingCutscene();
    } else if (gameState === 'victory') {
        drawVictory();
    } else {
        drawBackground();
        drawPlatforms();

        // Draw pickups
        pickups.forEach(p => p.draw(ctx));

        // Draw enemies
        enemies.forEach(e => e.draw(ctx));

        // Draw boss
        if (boss.alive) boss.draw(ctx);

        // Draw player
        player.draw(ctx);

        // Draw projectiles
        projectiles.forEach(p => p.draw(ctx));

        // Draw particles
        particles.forEach(p => p.draw(ctx));

        // Draw score popups
        scorePopups.forEach(sp => {
            const alpha = Math.min(1, sp.life / 20);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.font = 'bold 14px monospace';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#ffcc44';
            ctx.fillText(`+${sp.points}`, sp.x - cam.x, sp.y - cam.y);
            ctx.restore();
        });

        // Draw bombs
        bombs.forEach(b => b.draw(ctx));

        // Draw grenades
        grenades.forEach(g => g.draw(ctx));

        // Draw shockwaves
        shockwaves.forEach(s => s.draw(ctx));

        // Draw rail beams
        railBeams.forEach(b => {
            const a = b.life / 12;
            ctx.save();
            ctx.globalAlpha = a * 0.8;
            ctx.strokeStyle = '#ff00ff';
            ctx.lineWidth = 4 * a;
            ctx.beginPath();
            ctx.moveTo(b.x1 - cam.x, b.y1 - cam.y);
            ctx.lineTo(b.x2 - cam.x, b.y2 - cam.y);
            ctx.stroke();
            ctx.globalAlpha = a * 0.5;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2 * a;
            ctx.beginPath();
            ctx.moveTo(b.x1 - cam.x, b.y1 - cam.y);
            ctx.lineTo(b.x2 - cam.x, b.y2 - cam.y);
            ctx.stroke();
            ctx.restore();
        });

        // Draw HUD
        drawHUD();

        // Overlays
        if (gameState === 'dead') drawDeathScreen();
        if (gameState === 'gameover') drawGameOverScreen();
        if (gameState === 'levelComplete') drawLevelComplete();
        if (gameState === 'paused') {
            ctx.fillStyle = '#000000aa';
            ctx.fillRect(0, 0, GW, GH);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 42px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('PAUSED', GW/2, GH/2 - 20);
            ctx.fillStyle = '#aaaaaa';
            ctx.font = '16px monospace';
            ctx.fillText('Press ESC to Resume', GW/2, GH/2 + 25);
            ctx.textAlign = 'left';
        }
    }

    ctx.restore();
}

// ======================== GAME STATE TRANSITIONS ========================
function handleStateInput() {
    // Music toggle
    if (keys['KeyM']) {
        keys['KeyM'] = false;
        musicOn = !musicOn;
        if (!musicOn) stopMusic();
        else if (gameState === 'playing') playMusic(bossActive ? (currentLevel === 4 ? 'finalboss' : 'boss') : (levelInfo.musicType || 'city'));
    }
    // Pause toggle
    if (keys['Escape']) {
        keys['Escape'] = false;
        if (gameState === 'playing') {
            gameState = 'paused';
        } else if (gameState === 'paused') {
            gameState = 'playing';
        }
    }
    if (gameState === 'paused') return;
    if (gameState === 'menu') {
        // Start menu music on first interaction
        if (audioCtx && musicNodes.length === 0 && musicOn) {
            playMusic('menu');
        }
        if (keys['KeyN'] && hasBeatenGame) {
            ensureAudio();
            stopMusic();
            newGamePlus = 1;
            gameState = 'intro';
            cutsceneTimer = 0;
            keys['KeyN'] = false;
        } else if (keys['KeyP'] && hasBeatenNGPlus) {
            ensureAudio();
            stopMusic();
            newGamePlus = 2;
            gameState = 'intro';
            cutsceneTimer = 0;
            keys['KeyP'] = false;
        } else if (mouse.down || keys['Enter'] || keys['NumpadEnter']) {
            ensureAudio();
            stopMusic();
            newGamePlus = 0;
            gameState = 'intro';
            cutsceneTimer = 0;
            keys['Enter'] = false; keys['NumpadEnter'] = false;
            mouse.down = false;
        }
    } else if (gameState === 'intro') {
        if (cutsceneTimer >= 540 && (mouse.down || keys['Enter'] || keys['NumpadEnter'])) {
            startNewGame();
            keys['Enter'] = false; keys['NumpadEnter'] = false;
            mouse.down = false;
        }
    } else if (gameState === 'dead') {
        if (deathMsgTimer > 0) { deathMsgTimer--; return; }
        if (keys['KeyR'] || mouse.down) {
            comboMultiplier = 1; comboTimer = 0;
            levelInfo = loadLevel(currentLevel);
            gameState = 'playing';
            keys['KeyR'] = false;
            mouse.down = false;
        }
    } else if (gameState === 'gameover') {
        if (deathMsgTimer > 0) { deathMsgTimer--; return; }
        if (keys['KeyR'] || keys['Enter'] || keys['NumpadEnter'] || mouse.down) {
            startNewGame();
            keys['KeyR'] = false; keys['Enter'] = false; keys['NumpadEnter'] = false;
            mouse.down = false;
        }
    } else if (gameState === 'levelComplete') {
        if (levelTransTimer > 0) { levelTransTimer--; }

        // Timer bonus countdown (starts 0.5s after screen appears)
        if (levelTransTimer < 120 && timerBonusCountdown > 0) {
            const tickAmt = Math.min(2, timerBonusCountdown);
            timerBonusCountdown -= tickAmt;
            const bonusPts = tickAmt * 10;
            score += bonusPts;
            timerBonusScore += bonusPts;
            checkExtraLife();

            timerBonusSoundTick++;
            if (timerBonusSoundTick % 3 === 0) {
                playSound('timerTick');
            }
        }

        if (timerBonusCountdown <= 0 && levelTransTimer <= 120 && (keys['Enter'] || keys['NumpadEnter'] || mouse.down)) {
            if (currentLevel < 4) {
                currentLevel++;
                levelInfo = loadLevel(currentLevel);
                gameState = 'playing';
            } else {
                gameState = 'ending';
                cutsceneTimer = 0;
            }
            keys['Enter'] = false; keys['NumpadEnter'] = false;
            mouse.down = false;
        }
    } else if (gameState === 'victory') {
        if (keys['Enter'] || keys['NumpadEnter']) {
            currentLevel = 0;
            gameState = 'menu';
            playMusic('menu');
            keys['Enter'] = false; keys['NumpadEnter'] = false;
        }
    } else if (gameState === 'ending') {
        const endUnlock = newGamePlus >= 2 ? 1260 : (newGamePlus === 1 ? 840 : 420);
        if (cutsceneTimer >= endUnlock) {
            if (keys['KeyN'] && newGamePlus === 0) {
                // Start New Game+
                hasBeatenGame = true;
                newGamePlus = 1;
                score = 0; lives = 3; nextLifeAt = 15000; lifeUpTimer = 0;
                comboMultiplier = 1; comboTimer = 0;
                currentLevel = 0;
                gameState = 'intro';
                cutsceneTimer = 0;
                keys['KeyN'] = false;
            } else if (keys['KeyP'] && newGamePlus === 1) {
                // Start New Game++
                hasBeatenGame = true;
                hasBeatenNGPlus = true;
                newGamePlus = 2;
                score = 0; lives = 3; nextLifeAt = 20000; lifeUpTimer = 0;
                comboMultiplier = 1; comboTimer = 0;
                currentLevel = 0;
                gameState = 'intro';
                cutsceneTimer = 0;
                keys['KeyP'] = false;
            } else if (keys['Enter'] || keys['NumpadEnter'] || mouse.down) {
                if (newGamePlus === 0) hasBeatenGame = true;
                if (newGamePlus === 1) { hasBeatenGame = true; hasBeatenNGPlus = true; }
                currentLevel = 0;
                gameState = 'menu';
                stopMusic();
                playMusic('menu');
                keys['Enter'] = false; keys['NumpadEnter'] = false;
                mouse.down = false;
            }
        }
    }
}

// ======================== MAIN LOOP ========================
const TARGET_FPS = 60;
const FRAME_TIME = 1000 / TARGET_FPS;
let lastFrameTime = 0;
let accumulator = 0;

function gameLoop(timestamp) {
    if (!lastFrameTime) lastFrameTime = timestamp;
    const delta = timestamp - lastFrameTime;
    lastFrameTime = timestamp;
    accumulator += Math.min(delta, 100); // cap to prevent spiral of death

    while (accumulator >= FRAME_TIME) {
        handleStateInput();
        update();
        accumulator -= FRAME_TIME;
    }
    render();
    requestAnimationFrame(gameLoop);
}

// ======================== INIT ========================
requestAnimationFrame(gameLoop);
</script>
