<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickman Rush</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
canvas { cursor: crosshair; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ======================== CONSTANTS ========================
const GW = 960, GH = 540;
const GRAVITY = 0.55;
const P_WALK = 5.2, P_RUN = 5.5, P_JUMP = -11.5;
const P_MAX_HP = 3, P_SHOOT_CD = 14, P_INVULN = 60;
const PROJ_SPD = 10, E_PROJ_SPD = 5;
const PLAT_COLOR_DEFAULT = '#555';
const PARRY_DUR = 9;
const DASH_DUR = 6;
const DASH_CD = 48;
const DASH_SPEED = 16;

// Weapon definitions
const WEAPONS = {
    pistol:     { name:'Pistol',      ammo:Infinity, damage:1, cooldown:14, spread:1, projSpeed:10, projColor:'#ffff44', color:'#ffff44' },
    railgun:    { name:'Railgun',     ammo:25,       damage:8, cooldown:32, spread:1, projSpeed:14, projColor:'#ff00ff', color:'#ff00ff' },
    burst:      { name:'Burst Rifle', ammo:90,       damage:2, cooldown:30, spread:1, projSpeed:11, projColor:'#ff8844', color:'#ff8844' },
    machinegun: { name:'Machine Gun', ammo:180,      damage:1, cooldown:5,  spread:1, projSpeed:11, projColor:'#44ffff', color:'#44ffff' },
    grenade:    { name:'Grenade',     ammo:20,       damage:10, cooldown:45, spread:1, projSpeed:10, projColor:'#44cc44', color:'#44cc44' },
};

// ======================== GLOBALS ========================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = GW; canvas.height = GH;

let keys = {}, mouse = { x: GW/2, y: GH/2, down: false, rightDown: false };
let gameState = 'menu';
let currentLevel = 0;
let cam = { x: 0, y: 0 };
let shake = 0;
let player, platforms, enemies, projectiles, particles, boss;
let bossActive = false, bossDeadTimer = 0;
let levelTransTimer = 0;
let deathMsgTimer = 0;
let audioCtx = null;
let score = 0, lives = 3, nextLifeAt = 10000, lifeUpTimer = 0;
let comboMultiplier = 1, comboTimer = 0, comboMaxTimer = 300; // 5 seconds at 60fps
let stageTimer = 300, stageTimerTick = 0;
let timerBonusCountdown = 0, timerBonusScore = 0, timerBonusSoundTick = 0;
let pickups = [];
let scorePopups = [];
let bombs = [];
let grenades = [];
let shockwaves = [];
let railBeams = [];
let lightningAlpha = 0, lightningCD = 0;
let cutsceneTimer = 0;
let newGamePlus = 0, sprintTogglePersist = false;
let hasBeatenGame = false, hasBeatenNGPlus = false;
let konamiBuffer = [], konamiCode = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','KeyB','KeyA'];
let musicOn = true, musicNodes = [], musicIntervals = [], musicGain = null;

// ======================== MUSIC SYSTEM ========================
function stopMusic() {
    musicIntervals.forEach(id => clearInterval(id));
    musicIntervals = [];
    musicNodes.forEach(n => { try { n.stop(); } catch(e){} });
    musicNodes = [];
}
function playMusic(type) {
    stopMusic();
    if (!musicOn) return;
    ensureAudio();
    musicGain = audioCtx.createGain();
    musicGain.gain.value = 0.05;
    musicGain.connect(audioCtx.destination);

    // BPM: ~120 for levels, ~140 for boss, ~155 for final boss
    const bpms = { city:140, desert:140, rooftop:140, cave:140, fortress:140, boss:150, finalboss:155, victory:132, finalvictory:110, death:80, menu:135 };
    const bpm = bpms[type] || 120;
    const beat = 60000 / bpm; // ms per beat
    const eighth = beat / 2;

    // Catchy chiptune melodies - Mega Man / Contra / Castlevania inspired
    const n = (midi) => 440 * Math.pow(2, (midi - 69) / 12);
    const themes = {
        city: {
            bass: [40,40,43,47, 45,45,43,40, 40,40,43,47, 45,47,48,47].map(n),
            lead: [64,71,76,74, 71,67,69,71, 76,74,71,67, 69,67,64,67].map(n),
            arp:  [52,59,64,59, 55,59,64,59, 57,64,69,64, 55,62,67,62].map(n),
            lw:'sawtooth', bw:'square', aw:'square', drums:true
        },
        desert: {
            bass: [45,45,52,50, 48,48,52,45, 45,45,52,50, 48,50,52,57].map(n),
            lead: [69,72,76,81, 79,76,74,76, 77,81,79,76, 74,72,69,72].map(n),
            arp:  [57,64,69,64, 60,64,69,64, 53,60,65,60, 52,59,64,59].map(n),
            lw:'sawtooth', bw:'square', aw:'square', drums:true
        },
        rooftop: {
            bass: [47,47,54,52, 50,50,54,47, 47,47,54,52, 50,52,54,47].map(n),
            lead: [71,74,78,83, 81,78,74,76, 78,81,83,81, 78,76,74,78].map(n),
            arp:  [59,66,71,66, 62,66,71,66, 64,71,76,71, 62,69,74,69].map(n),
            lw:'sawtooth', bw:'square', aw:'square', drums:true
        },
        cave: {
            bass: [36,36,43,39, 44,44,46,48, 36,36,43,39, 44,46,48,43].map(n),
            lead: [60,63,67,72, 70,67,63,65, 67,70,72,75, 72,70,67,63].map(n),
            arp:  [48,55,60,55, 51,55,60,55, 56,60,63,60, 58,65,70,65].map(n),
            lw:'sawtooth', bw:'square', aw:'square', drums:true
        },
        fortress: {
            bass: [38,38,45,41, 46,46,48,50, 38,38,45,41, 46,48,50,45].map(n),
            lead: [62,65,69,74, 72,69,65,67, 69,74,77,76, 74,72,69,65].map(n),
            arp:  [50,57,62,57, 53,57,62,57, 58,62,65,62, 60,67,72,67].map(n),
            lw:'sawtooth', bw:'square', aw:'square', drums:true
        },
        boss: {
            bass: [40,40,47,45, 43,43,45,47, 40,40,47,45, 43,45,47,50].map(n),
            lead: [76,79,83,76, 74,71,67,71, 76,79,81,79, 76,74,71,76].map(n),
            arp:  [52,59,64,59, 55,59,64,59, 57,64,69,64, 59,64,67,64].map(n),
            lw:'sawtooth', bw:'sawtooth', aw:'square', drums:true
        },
        finalboss: {
            bass: [37,37,44,42, 40,40,44,47, 37,37,44,42, 40,42,44,47].map(n),
            lead: [73,76,80,85, 83,80,76,78, 80,83,85,88, 85,83,80,76].map(n),
            arp:  [49,56,61,56, 52,56,61,56, 54,61,66,61, 56,64,68,64].map(n),
            lw:'sawtooth', bw:'sawtooth', aw:'square', drums:true
        },
        victory: {
            bass: [48,52,55,48, 53,57,60,53, 48,52,55,48, 55,57,60,55].map(n),
            lead: [72,76,79,84, 83,79,76,79, 81,84,88,84, 79,76,72,76].map(n),
            arp:  [60,67,72,67, 64,67,72,67, 65,69,72,69, 67,71,74,71].map(n),
            lw:'triangle', bw:'square', aw:'triangle', drums:true
        },
        finalvictory: {
            bass: [41,45,48,41, 46,50,53,46, 41,45,48,41, 48,50,53,48].map(n),
            lead: [65,69,72,77, 76,72,69,72, 74,77,81,77, 72,69,65,69, 70,74,77,74, 72,76,79,76, 77,81,84,81, 77,76,74,72].map(n),
            arp:  [53,60,65,60, 57,60,65,60, 58,62,65,62, 60,64,67,64].map(n),
            lw:'triangle', bw:'triangle', aw:'sine', drums:false
        },
        death: {
            bass: [40,39,38,37, 36,35,34,33].map(n),
            lead: [64,62,60,59, 57,55,53,52].map(n),
            arp:  [52,50,48,47, 45,43,41,40].map(n),
            lw:'triangle', bw:'triangle', aw:'sine', drums:false
        },
        menu: {
            bass: [33,33,40,38, 36,36,38,40, 33,33,40,38, 36,40,43,45].map(n),
            lead: [69,76,81,78, 76,72,69,72, 76,81,84,81, 78,76,72,69].map(n),
            arp:  [45,52,57,52, 48,52,57,52, 50,57,62,57, 52,57,60,57].map(n),
            lw:'sawtooth', bw:'sawtooth', aw:'square', drums:true
        },
    };
    const th = themes[type] || themes.city;

    // Bass channel
    const bo = audioCtx.createOscillator(), bg = audioCtx.createGain();
    bo.type = th.bw; bo.frequency.value = th.bass[0]; bg.gain.value = 0.45;
    bo.connect(bg); bg.connect(musicGain); bo.start(); musicNodes.push(bo);
    let bi = 0;
    musicIntervals.push(setInterval(() => {
        const t = audioCtx.currentTime;
        bo.frequency.setValueAtTime(th.bass[bi % th.bass.length], t);
        bg.gain.setValueAtTime(0.45, t);
        bg.gain.linearRampToValueAtTime(0.2, t + eighth/1000);
        bi++;
    }, beat));

    // Lead melody channel
    const lo = audioCtx.createOscillator(), lg = audioCtx.createGain();
    lo.type = th.lw; lo.frequency.value = th.lead[0]; lg.gain.value = 0.25;
    lo.connect(lg); lg.connect(musicGain); lo.start(); musicNodes.push(lo);
    let li = 0;
    musicIntervals.push(setInterval(() => {
        const t = audioCtx.currentTime;
        lo.frequency.setValueAtTime(th.lead[li % th.lead.length], t);
        lg.gain.setValueAtTime(0.30, t);
        lg.gain.linearRampToValueAtTime(0.11, t + eighth/1000);
        li++;
    }, eighth));

    // Arpeggio channel
    const ao = audioCtx.createOscillator(), ag = audioCtx.createGain();
    ao.type = th.aw; ao.frequency.value = th.arp[0]; ag.gain.value = 0.15;
    ao.connect(ag); ag.connect(musicGain); ao.start(); musicNodes.push(ao);
    let ai = 0;
    musicIntervals.push(setInterval(() => {
        const t = audioCtx.currentTime;
        ao.frequency.setValueAtTime(th.arp[ai % th.arp.length], t);
        ag.gain.setValueAtTime(0.18, t);
        ag.gain.linearRampToValueAtTime(0.06, t + beat/8000);
        ai++;
    }, beat / 4));

    // Drums (kick + snare pattern)
    if (th.drums) {
        // Kick
        const ko = audioCtx.createOscillator(), kg = audioCtx.createGain();
        ko.type = 'sine'; ko.frequency.value = 80; kg.gain.value = 0;
        ko.connect(kg); kg.connect(musicGain); ko.start(); musicNodes.push(ko);
        // Snare (noise-like)
        const so = audioCtx.createOscillator(), sg = audioCtx.createGain();
        so.type = 'square'; so.frequency.value = 200; sg.gain.value = 0;
        so.connect(sg); sg.connect(musicGain); so.start(); musicNodes.push(so);
        // Hi-hat
        const ho = audioCtx.createOscillator(), hg = audioCtx.createGain();
        ho.type = 'square'; ho.frequency.value = 1000; hg.gain.value = 0;
        ho.connect(hg); hg.connect(musicGain); ho.start(); musicNodes.push(ho);
        let di = 0;
        musicIntervals.push(setInterval(() => {
            const t = audioCtx.currentTime;
            const pat = di % 8;
            // Kick on 0, 4 (or 0,3,4,7 for boss)
            const isBoss = type === 'boss' || type === 'finalboss';
            if (pat === 0 || pat === 4 || (isBoss && (pat === 3 || pat === 7))) {
                ko.frequency.setValueAtTime(120, t);
                ko.frequency.linearRampToValueAtTime(40, t + 0.08);
                kg.gain.setValueAtTime(0.35, t);
                kg.gain.linearRampToValueAtTime(0, t + 0.1);
            }
            // Snare on 2, 6
            if (pat === 2 || pat === 6) {
                so.frequency.setValueAtTime(250 + Math.random()*100, t);
                sg.gain.setValueAtTime(0.12, t);
                sg.gain.linearRampToValueAtTime(0, t + 0.06);
            }
            // Hi-hat on every step
            hg.gain.setValueAtTime(pat%2===0 ? 0.06 : 0.04, t);
            hg.gain.linearRampToValueAtTime(0, t + 0.03);
            ho.frequency.setValueAtTime(800 + Math.random()*400, t);
            di++;
        }, eighth));
    }
}

function resize() {
    const aspect = GW / GH;
    let w = window.innerWidth, h = window.innerHeight;
    if (w / h > aspect) w = h * aspect; else h = w / aspect;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
}
window.addEventListener('resize', resize);
resize();

// ======================== AUDIO ========================
function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(type) {
    try {
        ensureAudio();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        const t = audioCtx.currentTime;
        switch(type) {
            case 'jump':
                o.type = 'square'; o.frequency.setValueAtTime(250, t);
                o.frequency.linearRampToValueAtTime(500, t+0.08);
                g.gain.setValueAtTime(0.08, t); g.gain.linearRampToValueAtTime(0, t+0.1);
                o.start(t); o.stop(t+0.1); break;
            case 'dash':
                o.type = 'sawtooth'; o.frequency.setValueAtTime(220, t);
                o.frequency.linearRampToValueAtTime(450, t+0.03);
                o.frequency.linearRampToValueAtTime(60, t+0.18);
                g.gain.setValueAtTime(0.12, t); g.gain.linearRampToValueAtTime(0, t+0.2);
                o.start(t); o.stop(t+0.2);
                { const od = audioCtx.createOscillator();
                const gd = audioCtx.createGain();
                od.connect(gd); gd.connect(audioCtx.destination);
                od.type = 'square'; od.frequency.setValueAtTime(45, t);
                od.frequency.linearRampToValueAtTime(22, t+0.15);
                gd.gain.setValueAtTime(0.11, t); gd.gain.linearRampToValueAtTime(0, t+0.18);
                od.start(t); od.stop(t+0.18); }
                break;
            case 'parry':
                o.type = 'sine'; o.frequency.setValueAtTime(800, t);
                o.frequency.setValueAtTime(1100, t+0.03);
                o.frequency.setValueAtTime(900, t+0.06);
                g.gain.setValueAtTime(0.1, t); g.gain.linearRampToValueAtTime(0, t+0.1);
                o.start(t); o.stop(t+0.1);
                { const op = audioCtx.createOscillator();
                const gp = audioCtx.createGain();
                op.connect(gp); gp.connect(audioCtx.destination);
                op.type = 'square'; op.frequency.setValueAtTime(2000, t);
                op.frequency.linearRampToValueAtTime(1500, t+0.06);
                gp.gain.setValueAtTime(0.04, t); gp.gain.linearRampToValueAtTime(0, t+0.08);
                op.start(t); op.stop(t+0.08); }
                break;
            case 'shoot':
                o.type = 'sawtooth'; o.frequency.setValueAtTime(800, t);
                o.frequency.linearRampToValueAtTime(200, t+0.06);
                g.gain.setValueAtTime(0.06, t); g.gain.linearRampToValueAtTime(0, t+0.08);
                o.start(t); o.stop(t+0.08); break;
            case 'hit':
                o.type = 'square'; o.frequency.setValueAtTime(150, t);
                o.frequency.linearRampToValueAtTime(80, t+0.12);
                g.gain.setValueAtTime(0.1, t); g.gain.linearRampToValueAtTime(0, t+0.15);
                o.start(t); o.stop(t+0.15); break;
            case 'hurt':
                o.type = 'sawtooth'; o.frequency.setValueAtTime(200, t);
                o.frequency.linearRampToValueAtTime(100, t+0.2);
                g.gain.setValueAtTime(0.12, t); g.gain.linearRampToValueAtTime(0, t+0.25);
                o.start(t); o.stop(t+0.25); break;
            case 'explosion':
                o.type = 'sawtooth'; o.frequency.setValueAtTime(120, t);
                o.frequency.linearRampToValueAtTime(30, t+0.4);
                g.gain.setValueAtTime(0.15, t); g.gain.linearRampToValueAtTime(0, t+0.5);
                o.start(t); o.stop(t+0.5); break;
            case 'levelup':
                o.type = 'square';
                o.frequency.setValueAtTime(400, t);
                o.frequency.setValueAtTime(500, t+0.1);
                o.frequency.setValueAtTime(600, t+0.2);
                o.frequency.setValueAtTime(800, t+0.3);
                g.gain.setValueAtTime(0.08, t); g.gain.linearRampToValueAtTime(0, t+0.5);
                o.start(t); o.stop(t+0.5); break;
            case 'enemyShoot':
                o.type = 'triangle'; o.frequency.setValueAtTime(400, t);
                o.frequency.linearRampToValueAtTime(150, t+0.08);
                g.gain.setValueAtTime(0.05, t); g.gain.linearRampToValueAtTime(0, t+0.1);
                o.start(t); o.stop(t+0.1); break;
            case 'pickup':
                o.type = 'sine';
                o.frequency.setValueAtTime(500, t);
                o.frequency.setValueAtTime(700, t+0.06);
                o.frequency.setValueAtTime(1000, t+0.12);
                g.gain.setValueAtTime(0.1, t); g.gain.linearRampToValueAtTime(0, t+0.2);
                o.start(t); o.stop(t+0.2); break;
            case 'shotgun':
                o.type = 'sawtooth'; o.frequency.setValueAtTime(200, t);
                o.frequency.linearRampToValueAtTime(60, t+0.15);
                g.gain.setValueAtTime(0.18, t); g.gain.linearRampToValueAtTime(0, t+0.2);
                o.start(t); o.stop(t+0.2);
                // Second layer for boom
                const o2s = audioCtx.createOscillator();
                const g2s = audioCtx.createGain();
                o2s.connect(g2s); g2s.connect(audioCtx.destination);
                o2s.type = 'square'; o2s.frequency.setValueAtTime(100, t);
                o2s.frequency.linearRampToValueAtTime(40, t+0.12);
                g2s.gain.setValueAtTime(0.12, t); g2s.gain.linearRampToValueAtTime(0, t+0.15);
                o2s.start(t); o2s.stop(t+0.15);
                break;
            case 'railgun':
                // High-energy charge-up zap
                o.type = 'sawtooth'; o.frequency.setValueAtTime(1800, t);
                o.frequency.linearRampToValueAtTime(100, t+0.25);
                g.gain.setValueAtTime(0.2, t); g.gain.linearRampToValueAtTime(0, t+0.3);
                o.start(t); o.stop(t+0.3);
                // Deep bass thump
                const o2m = audioCtx.createOscillator();
                const g2m = audioCtx.createGain();
                o2m.connect(g2m); g2m.connect(audioCtx.destination);
                o2m.type = 'sine'; o2m.frequency.setValueAtTime(80, t);
                o2m.frequency.linearRampToValueAtTime(20, t+0.2);
                g2m.gain.setValueAtTime(0.25, t); g2m.gain.linearRampToValueAtTime(0, t+0.25);
                o2m.start(t); o2m.stop(t+0.25);
                // Electric crackle layer
                const o3r = audioCtx.createOscillator();
                const g3r = audioCtx.createGain();
                o3r.connect(g3r); g3r.connect(audioCtx.destination);
                o3r.type = 'square'; o3r.frequency.setValueAtTime(3000, t);
                o3r.frequency.setValueAtTime(600, t+0.03);
                o3r.frequency.setValueAtTime(2000, t+0.06);
                o3r.frequency.setValueAtTime(400, t+0.1);
                g3r.gain.setValueAtTime(0.08, t); g3r.gain.linearRampToValueAtTime(0, t+0.15);
                o3r.start(t); o3r.stop(t+0.15);
                break;
            case 'timerTick':
                o.type = 'square';
                o.frequency.setValueAtTime(700, t);
                o.frequency.linearRampToValueAtTime(500, t+0.02);
                g.gain.setValueAtTime(0.05, t);
                g.gain.linearRampToValueAtTime(0, t+0.03);
                o.start(t); o.stop(t+0.03); break;
            case 'grenade':
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, t);
                o.frequency.linearRampToValueAtTime(50, t+0.15);
                g.gain.setValueAtTime(0.14, t); g.gain.linearRampToValueAtTime(0, t+0.2);
                o.start(t); o.stop(t+0.2);
                const o2gl = audioCtx.createOscillator();
                const g2gl = audioCtx.createGain();
                o2gl.connect(g2gl); g2gl.connect(audioCtx.destination);
                o2gl.type = 'sine'; o2gl.frequency.setValueAtTime(80, t);
                o2gl.frequency.linearRampToValueAtTime(30, t+0.15);
                g2gl.gain.setValueAtTime(0.1, t); g2gl.gain.linearRampToValueAtTime(0, t+0.18);
                o2gl.start(t); o2gl.stop(t+0.18);
                break;
        }
    } catch(e) {}
}

function playComboSound(multiplier) {
    try {
        ensureAudio();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        const t = audioCtx.currentTime;
        const baseFreq = 400 + (multiplier - 1) * 150;
        o.type = 'square';
        o.frequency.setValueAtTime(baseFreq, t);
        o.frequency.setValueAtTime(baseFreq * 1.5, t + 0.05);
        o.frequency.setValueAtTime(baseFreq * 2, t + 0.1);
        g.gain.setValueAtTime(0.08, t);
        g.gain.linearRampToValueAtTime(0, t + 0.15);
        o.start(t); o.stop(t + 0.15);
    } catch(e) {}
}

// ======================== INPUT ========================
document.addEventListener('keydown', e => {
    keys[e.code] = true; e.preventDefault();
    // Init audio on first keypress
    if (!audioCtx) ensureAudio();
    // Konami code detection
    if (gameState === 'menu') {
        konamiBuffer.push(e.code);
        if (konamiBuffer.length > konamiCode.length) konamiBuffer.shift();
        if (konamiBuffer.length === konamiCode.length && konamiBuffer.every((k,i) => k === konamiCode[i])) {
            hasBeatenGame = true; hasBeatenNGPlus = true;
            konamiBuffer = [];
            playSound('levelup');
        }
    }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
window.addEventListener('blur', () => { keys = {}; });
canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - r.left) / r.width * GW;
    mouse.y = (e.clientY - r.top) / r.height * GH;
});
canvas.addEventListener('mousedown', e => { if (e.button === 0) mouse.down = true; if (e.button === 2) mouse.rightDown = true; if (!audioCtx) ensureAudio(); });
canvas.addEventListener('mouseup', e => { if (e.button === 0) mouse.down = false; if (e.button === 2) mouse.rightDown = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ======================== UTILITIES ========================
function rects(a, b) {
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}
function dist(a, b) { return Math.hypot(a.x-b.x, a.y-b.y); }
function lerp(a, b, t) { return a + (b-a)*t; }
function rand(min, max) { return Math.random()*(max-min)+min; }

// ======================== PARTICLES ========================
class Particle {
    constructor(x, y, color, vx, vy, life) {
        this.x = x; this.y = y; this.color = color;
        this.vx = vx || rand(-3,3); this.vy = vy || rand(-4,0);
        this.life = life || rand(15,35); this.maxLife = this.life;
        this.size = rand(2,5);
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.vy += 0.15; this.life--;
    }
    draw(cx) {
        const a = this.life / this.maxLife;
        cx.globalAlpha = a;
        cx.fillStyle = this.color;
        cx.fillRect(this.x - cam.x, this.y - cam.y, this.size, this.size);
        cx.globalAlpha = 1;
    }
}
function spawnParticles(x, y, color, count) {
    for (let i=0; i<count; i++) particles.push(new Particle(x, y, color));
}
function spawnDust(x, y) {
    for (let i=0; i<4; i++) particles.push(new Particle(x+rand(-5,5), y, '#aa9977', rand(-1,1), rand(-2,-0.5), rand(10,20)));
}
function spawnScorePopup(x, y, points) {
    scorePopups.push({ x: x, y: y, points: points, vy: -3, life: 60 });
}

// ======================== PROJECTILE ========================
class Projectile {
    constructor(x, y, vx, vy, owner, color, damage, batchId) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.owner = owner; this.color = color || (owner==='player' ? '#ffff44' : '#ff4444');
        this.damage = damage || 1;
        this.batchId = batchId || 0;
        this.w = 6; this.h = 6; this.alive = true; this.trail = []; this.piercing = false;
        this.gravity = owner === 'player' ? 0 : 0.02;
    }
    update() {
        this.trail.push({x: this.x, y: this.y});
        if (this.trail.length > (this.piercing ? 12 : 5)) this.trail.shift();
        this.x += this.vx; this.y += this.vy;
        this.vy += this.gravity;
        // Off-screen check
        if (this.x < cam.x-50 || this.x > cam.x+GW+50 || this.y < cam.y-50 || this.y > cam.y+GH+200) this.alive = false;
        // Platform collision
        for (const p of platforms) {
            if (this.passThrough && p.h <= 20) continue;
            if (rects({x:this.x-3,y:this.y-3,w:6,h:6}, p)) {
                this.alive = false;
                spawnParticles(this.x, this.y, this.color, 3);
                break;
            }
        }
    }
    draw(cx) {
        if (this.piercing) {
            // Laser beam effect
            for (let i=0; i<this.trail.length; i++) {
                const a = (i+1)/this.trail.length * 0.6;
                cx.globalAlpha = a;
                cx.strokeStyle = this.color;
                cx.lineWidth = 4;
                const next = this.trail[i+1] || {x:this.x, y:this.y};
                cx.beginPath();
                cx.moveTo(this.trail[i].x - cam.x, this.trail[i].y - cam.y);
                cx.lineTo(next.x - cam.x, next.y - cam.y);
                cx.stroke();
            }
            cx.globalAlpha = 1;
            cx.strokeStyle = '#ffffff';
            cx.lineWidth = 2;
            if (this.trail.length > 0) {
                cx.beginPath();
                cx.moveTo(this.trail[this.trail.length-1].x - cam.x, this.trail[this.trail.length-1].y - cam.y);
                cx.lineTo(this.x - cam.x, this.y - cam.y);
                cx.stroke();
            }
            cx.fillStyle = '#ffffff';
            cx.beginPath();
            cx.arc(this.x - cam.x, this.y - cam.y, 3, 0, Math.PI*2);
            cx.fill();
        } else {
            for (let i=0; i<this.trail.length; i++) {
                const a = (i+1)/this.trail.length * 0.4;
                cx.globalAlpha = a;
                cx.fillStyle = this.color;
                cx.beginPath();
                cx.arc(this.trail[i].x - cam.x, this.trail[i].y - cam.y, 2, 0, Math.PI*2);
                cx.fill();
            }
            cx.globalAlpha = 1;
            cx.fillStyle = this.color;
            cx.beginPath();
            cx.arc(this.x - cam.x, this.y - cam.y, 4, 0, Math.PI*2);
            cx.fill();
            cx.fillStyle = '#fff';
            cx.beginPath();
            cx.arc(this.x - cam.x, this.y - cam.y, 2, 0, Math.PI*2);
            cx.fill();
        }
    }
}

// ======================== STICK FIGURE DRAWING ========================
function drawStick(cx, x, y, w, h, facing, aimAngle, walkPhase, color, scale, isPlayer) {
    const sx = x - cam.x, sy = y - cam.y;
    const s = scale || 1;
    const headR = 7 * s;
    const bodyLen = 18 * s;
    const limbLen = 14 * s;
    const shoulderY = sy + headR*2 + 2*s;
    const hipY = shoulderY + bodyLen;
    const centerX = sx + w/2;

    cx.strokeStyle = color;
    cx.fillStyle = color;
    cx.lineWidth = 2.5 * s;
    cx.lineCap = 'round';

    // Head
    cx.beginPath();
    cx.arc(centerX, sy + headR + 1, headR, 0, Math.PI*2);
    cx.fill();

    // Body
    cx.beginPath();
    cx.moveTo(centerX, shoulderY);
    cx.lineTo(centerX, hipY);
    cx.stroke();

    // Legs
    const legSwing = Math.sin(walkPhase) * 0.6;
    cx.beginPath();
    cx.moveTo(centerX, hipY);
    cx.lineTo(centerX + Math.sin(legSwing) * limbLen, hipY + Math.cos(legSwing) * limbLen);
    cx.stroke();
    cx.beginPath();
    cx.moveTo(centerX, hipY);
    cx.lineTo(centerX + Math.sin(-legSwing) * limbLen, hipY + Math.cos(-legSwing) * limbLen);
    cx.stroke();

    // Arms
    if (isPlayer && aimAngle !== undefined) {
        // Aiming arm
        cx.strokeStyle = color;
        cx.beginPath();
        cx.moveTo(centerX, shoulderY + 3*s);
        cx.lineTo(centerX + Math.cos(aimAngle) * limbLen, shoulderY + 3*s + Math.sin(aimAngle) * limbLen);
        cx.stroke();
        // Hand dot
        cx.fillStyle = color;
        cx.beginPath();
        cx.arc(centerX + Math.cos(aimAngle) * limbLen, shoulderY + 3*s + Math.sin(aimAngle) * limbLen, 2.5*s, 0, Math.PI*2);
        cx.fill();
        // Back arm swings
        const armSwing = Math.sin(walkPhase + Math.PI) * 0.5;
        cx.beginPath();
        cx.moveTo(centerX, shoulderY + 3*s);
        cx.lineTo(centerX - facing * Math.abs(Math.cos(armSwing)) * limbLen*0.7, shoulderY + 3*s + Math.sin(armSwing+0.5) * limbLen*0.7);
        cx.stroke();
    } else {
        // Both arms for enemies/bosses
        const armSwing = Math.sin(walkPhase) * 0.5;
        cx.beginPath();
        cx.moveTo(centerX, shoulderY + 3*s);
        cx.lineTo(centerX + facing * limbLen*0.8, shoulderY + 3*s + limbLen*0.4);
        cx.stroke();
        cx.beginPath();
        cx.moveTo(centerX, shoulderY + 3*s);
        cx.lineTo(centerX + Math.sin(armSwing) * limbLen*0.7, shoulderY + 3*s + Math.abs(Math.cos(armSwing)) * limbLen*0.6);
        cx.stroke();
    }
}

// ======================== PLAYER ========================
class Player {
    constructor(x, y) {
        this.x = x; this.y = y; this.w = 20; this.h = 44;
        this.vx = 0; this.vy = 0;
        this.hp = P_MAX_HP; this.maxHp = P_MAX_HP;
        this.facing = 1; this.grounded = false;
        this.walkPhase = 0; this.shootCD = 0; this.invuln = 0;
        this.alive = true;
        this.weapon = { ...WEAPONS.pistol, type: 'pistol' };
        this.parryTimer = 0;
        this.parryCooldown = 0;
        this.parrySuccess = false;
        this.burstQueue = 0;
        this.burstCD = 0;
        this.dashTimer = 0;
        this.dashCooldown = 0;
    }
    get cx() { return this.x + this.w/2; }
    get cy() { return this.y + this.h/2; }
    get shoulderY() { return this.y + 16; }
    get aimAngle() {
        const mx = mouse.x + cam.x, my = mouse.y + cam.y;
        return Math.atan2(my - this.shoulderY, mx - this.cx);
    }
    update() {
        if (!this.alive) return;
        if (this.invuln > 0) this.invuln--;
        if (this.shootCD > 0) this.shootCD--;

        // Parry (right-click)
        if (mouse.rightDown && this.parryCooldown <= 0 && this.parryTimer <= 0) {
            this.parryTimer = PARRY_DUR;
            this.parryCooldown = 75;
            this.parrySuccess = false;
            mouse.rightDown = false;
            playSound('parry');
        }
        if (this.parryTimer > 0) this.parryTimer--;
        if (this.parryCooldown > 0) this.parryCooldown--;

        // Dash cooldown tick
        if (this.dashCooldown > 0) this.dashCooldown--;
        if (this.dashTimer > 0) {
            this.dashTimer--;
            particles.push(new Particle(this.cx, this.cy, '#44ffff', rand(-1,1), rand(-1,1), rand(8,15)));
        }

        // Movement
        const spd = P_WALK;
        let moving = false;
        const left = keys['KeyA'] || keys['ArrowLeft'];
        const right = keys['KeyD'] || keys['ArrowRight'];
        if (this.dashTimer > 0) {
            // During dash, override movement with dash velocity
        } else {
            if (left && !right) {
                this.vx = -spd; this.facing = -1; moving = true;
            } else if (right && !left) {
                this.vx = spd; this.facing = 1; moving = true;
            } else {
                this.vx = 0;
            }
        }

        // Initiate dash (Shift)
        if ((keys['ShiftLeft'] || keys['ShiftRight']) && this.dashCooldown <= 0 && this.dashTimer <= 0) {
            const dashDir = left ? -1 : right ? 1 : this.facing;
            this.dashTimer = DASH_DUR;
            this.dashCooldown = DASH_CD;
            this.vx = DASH_SPEED * dashDir;
            this.invuln = DASH_DUR;
            playSound('dash');
            shake = 5;
            for (let i = 0; i < 6; i++) {
                particles.push(new Particle(this.cx, this.cy, '#44ffff', rand(-3,3), rand(-3,1), rand(10,20)));
            }
        }

        if (moving && this.grounded) {
            this.walkPhase += spd * 0.15;
        } else if (!this.grounded) {
            // Slow walk animation in air
        } else {
            this.walkPhase = 0;
        }

        // Jump
        if ((keys['KeyW'] || keys['Space'] || keys['ArrowUp']) && this.grounded) {
            this.vy = P_JUMP; this.grounded = false;
            playSound('jump');
        }

        // Burst fire tick
        if (this.burstCD > 0) this.burstCD--;
        if (this.burstQueue > 0 && this.burstCD <= 0) {
            const cw = this.weapon;
            const angle = this.aimAngle;
            const hx = this.cx + Math.cos(angle) * 18;
            const hy = this.shoulderY + Math.sin(angle) * 18;
            projectiles.push(new Projectile(hx, hy, Math.cos(angle)*cw.projSpeed, Math.sin(angle)*cw.projSpeed, 'player', cw.projColor, cw.damage));
            this.burstQueue--;
            this.burstCD = 5;
            if (cw.type !== 'pistol') cw.ammo--;
            playSound('shoot');
        }

        // Shooting
        if (mouse.down && this.shootCD <= 0) {
            const w = this.weapon;
            if (w.type !== 'pistol' && w.ammo <= 0) {
                this.weapon = { ...WEAPONS.pistol, type: 'pistol' };
            }
            const cw = this.weapon;
            this.shootCD = cw.cooldown;
            const angle = this.aimAngle;
            const batch = Date.now() + Math.random();
            if (cw.type === 'grenade') {
                const hx = this.cx + Math.cos(angle) * 18;
                const hy = this.shoulderY + Math.sin(angle) * 18;
                grenades.push(new Grenade(hx, hy, Math.cos(angle)*cw.projSpeed, Math.sin(angle)*cw.projSpeed));
            } else if (cw.type === 'burst') {
                const hx = this.cx + Math.cos(angle) * 18;
                const hy = this.shoulderY + Math.sin(angle) * 18;
                projectiles.push(new Projectile(hx, hy, Math.cos(angle)*cw.projSpeed, Math.sin(angle)*cw.projSpeed, 'player', cw.projColor, cw.damage));
                cw.ammo--;
                this.burstQueue = 2;
                this.burstCD = 5;
            } else if (cw.spread <= 1) {
                let shootAngle = angle;
                if (cw.type === 'machinegun') shootAngle += rand(-0.085, 0.085);
                if (cw.type === 'railgun') {
                    // Hitscan instant-hit railgun
                    const hx = this.cx + Math.cos(shootAngle) * 18;
                    const hy = this.shoulderY + Math.sin(shootAngle) * 18;
                    const step = 4;
                    let rx = hx, ry = hy;
                    let hitWall = false;
                    const maxDist = 1200;
                    const hitEnemies = new Set();
                    let hitBoss = false;
                    let hitCount = 0;
                    for (let d = 0; d < maxDist; d += step) {
                        rx += Math.cos(shootAngle) * step;
                        ry += Math.sin(shootAngle) * step;
                        // Check enemy hits (pierce through, once per enemy, damage falloff)
                        enemies.forEach(e => {
                            if (e.alive && !hitEnemies.has(e) && rects({x:rx-4,y:ry-4,w:8,h:8}, e)) {
                                const dmg = hitCount >= 3 ? 1 : (cw.damage >> hitCount);
                                e.takeDamage(rx, dmg);
                                spawnParticles(rx, ry, '#ff00ff', 4);
                                hitEnemies.add(e);
                                hitCount++;
                            }
                        });
                        // Check boss hit (pierce through, once, damage falloff)
                        if (!hitBoss && boss && boss.alive && boss.active && rects({x:rx-4,y:ry-4,w:8,h:8}, boss)) {
                            const dmg = hitCount >= 3 ? 1 : (cw.damage >> hitCount);
                            boss.takeDamage(rx, dmg);
                            spawnParticles(rx, ry, '#ff00ff', 4);
                            hitBoss = true;
                            hitCount++;
                        }
                        // Check platform collision (stops beam)
                        for (const p of platforms) {
                            if (rects({x:rx-2,y:ry-2,w:4,h:4}, p)) {
                                hitWall = true;
                                spawnParticles(rx, ry, '#ff88ff', 5);
                                break;
                            }
                        }
                        if (hitWall) break;
                    }
                    railBeams.push({x1:hx, y1:hy, x2:rx, y2:ry, life:12});
                    shake = 3;
                } else {
                const hx = this.cx + Math.cos(shootAngle) * 18;
                const hy = this.shoulderY + Math.sin(shootAngle) * 18;
                const proj = new Projectile(hx, hy, Math.cos(shootAngle)*cw.projSpeed, Math.sin(shootAngle)*cw.projSpeed, 'player', cw.projColor, cw.damage);
                projectiles.push(proj);
                }
            } else {
                for (let i = 0; i < cw.spread; i++) {
                    const a = angle + (i - (cw.spread-1)/2) * 0.0731 + rand(-0.02, 0.02);
                    const hx = this.cx + Math.cos(a) * 18;
                    const hy = this.shoulderY + Math.sin(a) * 18;
                    projectiles.push(new Projectile(hx, hy, Math.cos(a)*cw.projSpeed, Math.sin(a)*cw.projSpeed, 'player', cw.projColor, cw.damage, batch));
                }
            }
            if (cw.type !== 'pistol' && cw.type !== 'burst') cw.ammo--;
            playSound(cw.type === 'burst' ? 'shotgun' : cw.type === 'railgun' ? 'railgun' : cw.type === 'grenade' ? 'grenade' : 'shoot');
        }

        // Physics
        this.vy += GRAVITY;
        if (this.vy > 14) this.vy = 14;

        // Horizontal movement + collision (only solid platforms)
        this.x += this.vx;
        for (const p of platforms) {
            if (p.h <= 20) continue; // thin platforms are pass-through
            if (rects(this, p)) {
                if (this.vx > 0) this.x = p.x - this.w;
                else if (this.vx < 0) this.x = p.x + p.w;
                this.vx = 0;
            }
        }

        // Vertical movement + collision
        const prevBottom = this.y + this.h;
        this.y += this.vy;
        this.grounded = false;
        for (const p of platforms) {
            if (rects(this, p)) {
                if (this.vy > 0) {
                    // Thin platforms: only land if feet were above the platform top
                    if (p.h <= 20 && prevBottom > p.y + 4) continue;
                    this.y = p.y - this.h;
                    if (this.vy > 4) spawnDust(this.cx, p.y);
                    this.vy = 0;
                    this.grounded = true;
                } else if (this.vy < 0) {
                    if (p.h <= 20) continue; // pass through thin platforms from below
                    this.y = p.y + p.h;
                    this.vy = 0;
                }
            }
        }

        // Fall off screen
        if (this.y > GH + 100 + cam.y) {
            this.hp = 0;
            this.alive = false;
        }

        // Clamp to left of level
        if (this.x < 0) this.x = 0;
        // Clamp to right of level
        if (levelInfo && this.x + this.w > levelInfo.width) this.x = levelInfo.width - this.w;
    }
    takeDamage(fromX) {
        if (this.invuln > 0 || !this.alive) return;
        this.hp--;
        this.invuln = P_INVULN;
        comboMultiplier = 1; comboTimer = 0;
        this.vy = -5;
        this.vx = (this.cx > fromX ? 4 : -4);
        shake = 8;
        playSound('hurt');
        spawnParticles(this.cx, this.cy, '#ff4444', 6);
        if (this.hp <= 0) { this.alive = false; }
    }
    draw(cx) {
        if (!this.alive) return;
        if (this.invuln > 0 && this.dashTimer <= 0 && Math.floor(this.invuln/4) % 2 === 0) return; // Flash
        // Parry circle effect
        if (this.parryTimer > 0) {
            const t = Math.min(1, this.parryTimer / PARRY_DUR);
            const r = 28;
            const parryColor = this.parrySuccess ? '#ffff44' : '#44ffff';
            cx.save();
            if (this.parrySuccess) {
                // Bright expanding flash ring
                const flashR = r + (1 - t) * 20;
                cx.globalAlpha = t * 0.5;
                cx.strokeStyle = '#ffffff';
                cx.lineWidth = 2;
                cx.beginPath();
                cx.arc(this.cx - cam.x, this.cy - cam.y, flashR, 0, Math.PI * 2);
                cx.stroke();
                // Thick golden ring
                cx.globalAlpha = t * 0.9;
                cx.strokeStyle = parryColor;
                cx.lineWidth = 5;
                cx.beginPath();
                cx.arc(this.cx - cam.x, this.cy - cam.y, r, 0, Math.PI * 2);
                cx.stroke();
                // Strong fill
                cx.globalAlpha = t * 0.35;
                cx.fillStyle = parryColor;
                cx.beginPath();
                cx.arc(this.cx - cam.x, this.cy - cam.y, r, 0, Math.PI * 2);
                cx.fill();
            } else {
                cx.globalAlpha = t * 0.7;
                cx.strokeStyle = parryColor;
                cx.lineWidth = 3;
                cx.beginPath();
                cx.arc(this.cx - cam.x, this.cy - cam.y, r, 0, Math.PI * 2);
                cx.stroke();
                cx.globalAlpha = t * 0.15;
                cx.fillStyle = parryColor;
                cx.beginPath();
                cx.arc(this.cx - cam.x, this.cy - cam.y, r, 0, Math.PI * 2);
                cx.fill();
            }
            cx.restore();
        }
        drawStick(cx, this.x, this.y, this.w, this.h, this.facing, this.aimAngle, this.walkPhase, '#ffffff', 1, true);
        // Cooldown bars below player
        const barY = this.y + this.h + 6 - cam.y;
        const barX = this.cx - cam.x - 16;
        const barW = 32, barH = 3;
        if (this.parryCooldown > 0) {
            cx.fillStyle = '#222';
            cx.fillRect(barX, barY, barW, barH);
            cx.fillStyle = '#44ffff';
            cx.fillRect(barX, barY, barW * (1 - this.parryCooldown / 75), barH);
        }
        if (this.dashCooldown > 0) {
            const dBarY = barY + (this.parryCooldown > 0 ? barH + 2 : 0);
            cx.fillStyle = '#222';
            cx.fillRect(barX, dBarY, barW, barH);
            cx.fillStyle = '#44ff44';
            cx.fillRect(barX, dBarY, barW * (1 - this.dashCooldown / DASH_CD), barH);
        }
    }
}

// ======================== ENEMY ========================
class Enemy {
    constructor(x, y, type, patrolL, patrolR, cfg) {
        cfg = cfg || {};
        this.x = x; this.y = y; this.w = 20; this.h = 44;
        this.vx = 0; this.vy = 0;
        this.type = type;
        let baseHp = cfg.hp || (type === 'shooter' ? 3 : 2);
        if (type === 'exploder') baseHp = Math.max(1, Math.ceil(baseHp * 0.5));
        this.hp = Math.ceil(baseHp * 1.5);
        this.maxHp = this.hp;
        this.patrolL = patrolL; this.patrolR = patrolR;
        this.facing = 1; this.grounded = false;
        this.walkPhase = 0; this.shootCD = rand(60,180);
        this.invuln = 0; this.alive = true;
        this.speed = cfg.speed || (type === 'shooter' ? 0.8 : 1.5);
        if (type === 'exploder') this.speed = Math.max(this.speed, 2.0);
        this.shootRate = (cfg.shootRate || 100) * 0.8;
        this.shootRateRand = (cfg.shootRateRand || 60) * 0.8;
        this.spreadCount = cfg.spreadCount || 1;
        this.jumpy = cfg.jumpy || false;
        if (type === 'exploder') this.jumpy = true;
        this.jumpRate = cfg.jumpRate || (type === 'exploder' ? 90 : 150);
        this.jumpCD = rand(60, this.jumpRate);
        this.aggressive = cfg.aggressive || false;
        if (type === 'exploder') this.aggressive = true;
        this.lastBatchId = 0;
        this.activated = false;
        this.baseY = y;
        this.flyPhase = rand(0, Math.PI*2);
        this.flyDirCD = 0;
        this.prevX = x;
        this.stuckTimer = 0;
        this.color = cfg.color || (type === 'exploder' ? '#ff8800' : type === 'flyer' ? '#44dddd' : type === 'shooter' ? '#dd66ff' : '#ee4444');
    }
    get cx() { return this.x + this.w/2; }
    get cy() { return this.y + this.h/2; }
    update() {
        if (!this.alive) return;
        // Dormant until player is nearby
        if (!this.activated) {
            const activeDist = this.type === 'exploder' ? 350 : (this.aggressive ? 500 : 600);
            if (player.alive && Math.abs(player.cx - this.cx) < activeDist) {
                this.activated = true;
            } else {
                return;
            }
        }
        if (this.invuln > 0) this.invuln--;
        if (this.shootCD > 0) this.shootCD--;
        if (this.jumpCD > 0) this.jumpCD--;

        // Movement: aggressive chase or normal patrol
        if (this.aggressive && player.alive && Math.abs(player.cx - this.cx) < 400) {
            const dx = player.cx - this.cx;
            this.facing = dx > 0 ? 1 : -1;
            this.vx = this.facing * this.speed * 1.4;
        } else {
            this.vx = this.facing * this.speed;
            if (this.x <= this.patrolL) { this.facing = 1; }
            if (this.x + this.w >= this.patrolR) { this.facing = -1; }
        }

        if (Math.abs(this.vx) > 0.1 && this.grounded) {
            this.walkPhase += Math.abs(this.vx) * 0.15;
        }

        // Jumping
        if (this.jumpy && this.jumpCD <= 0 && this.grounded) {
            // Exploders: also jump preemptively to avoid falling off edges
            let shouldJump = true;
            if (this.type === 'exploder') {
                // Check if ground exists ahead
                const checkX = this.cx + this.facing * 30;
                const checkY = this.y + this.h + 5;
                let groundAhead = false;
                for (const p of platforms) {
                    if (checkX > p.x && checkX < p.x + p.w && checkY > p.y && checkY < p.y + p.h + 20) {
                        groundAhead = true; break;
                    }
                }
                if (!groundAhead) {
                    this.vy = -11;
                    this.grounded = false;
                    this.jumpCD = 20;
                    shouldJump = false;
                }
            }
            if (shouldJump) {
                this.vy = -10;
                this.grounded = false;
                this.jumpCD = this.jumpRate + rand(-30, 30);
            }
        }
        // Exploders: edge-detect even if jumpCD > 0
        if (this.type === 'exploder' && this.grounded && this.jumpCD > 0) {
            const checkX = this.cx + this.facing * 25;
            const checkY = this.y + this.h + 5;
            let groundAhead = false;
            for (const p of platforms) {
                if (checkX > p.x && checkX < p.x + p.w && checkY > p.y && checkY < p.y + p.h + 20) {
                    groundAhead = true; break;
                }
            }
            if (!groundAhead) {
                this.vy = -11;
                this.grounded = false;
                this.jumpCD = 20;
            }
        }

        // Shooting
        if (this.type !== 'exploder' && this.shootCD <= 0 && player.alive) {
            const dx = player.cx - this.cx, dy = player.cy - this.cy;
            const d = Math.hypot(dx, dy);
            if (d < 500) {
                this.facing = dx > 0 ? 1 : -1;
                const baseAngle = Math.atan2(dy, dx);
                projectiles.push(new Projectile(this.cx, this.y+16, Math.cos(baseAngle)*E_PROJ_SPD*1.4, Math.sin(baseAngle)*E_PROJ_SPD*1.4, 'enemy'));
                this.shootCD = this.shootRate + rand(0, this.shootRateRand);
                playSound('enemyShoot');
            }
        }

        // Physics
        if (this.type === 'flyer') {
            this.flyPhase += 0.04;
            this.y = this.baseY + Math.sin(this.flyPhase) * 25;
            if (this.flyDirCD > 0) this.flyDirCD--;
            if (player.alive && Math.abs(player.cx - this.cx) < 500) {
                const dx = player.cx - this.cx;
                const wantFacing = dx > 0 ? 1 : -1;
                if (wantFacing !== this.facing && this.flyDirCD <= 0) {
                    this.facing = wantFacing;
                    this.flyDirCD = 90;
                }
                this.vx = this.facing * this.speed * 1.2;
            } else {
                this.vx = this.facing * this.speed;
                if (this.x <= this.patrolL && this.flyDirCD <= 0) { this.facing = 1; this.flyDirCD = 90; }
                if (this.x + this.w >= this.patrolR && this.flyDirCD <= 0) { this.facing = -1; this.flyDirCD = 90; }
            }
            this.x += this.vx;
            this.walkPhase += Math.abs(this.vx) * 0.1;
        } else {
        this.vy += GRAVITY;
        if (this.vy > 14) this.vy = 14;
        this.x += this.vx;
        for (const p of platforms) {
            if (p.h <= 20) continue;
            if (rects(this, p)) {
                if (this.vx > 0) this.x = p.x - this.w;
                else if (this.vx < 0) this.x = p.x + p.w;
                this.vx = 0;
            }
        }
        const prevBot = this.y + this.h;
        this.y += this.vy;
        this.grounded = false;
        for (const p of platforms) {
            if (rects(this, p)) {
                if (this.vy > 0) {
                    if (p.h <= 20 && prevBot > p.y + 4) continue;
                    this.y = p.y - this.h; this.vy = 0; this.grounded = true;
                } else if (this.vy < 0) {
                    if (p.h <= 20) continue;
                    this.y = p.y + p.h; this.vy = 0;
                }
            }
        }
        }
        // Stuck detection: if trying to move but barely moving, jump
        if (this.grounded && this.activated && this.type !== 'flyer') {
            if (Math.abs(this.x - this.prevX) < 0.5 && Math.abs(this.vx) > 0.3) {
                this.stuckTimer++;
                if (this.stuckTimer > 8) {
                    this.vy = -11;
                    this.grounded = false;
                    this.stuckTimer = 0;
                }
            } else {
                this.stuckTimer = 0;
            }
            this.prevX = this.x;
        }
        if (this.y > GH + 200 + cam.y) this.alive = false;

        // Exploder suicide: detonate when close to player
        if (this.type === 'exploder' && this.alive && player.alive && Math.hypot(player.cx - this.cx, player.cy - this.cy) < 100) {
            this.alive = false;
            // Big lingering explosion particles
            spawnParticles(this.cx, this.cy, this.color, 15);
            spawnParticles(this.cx, this.cy, '#ff8800', 30);
            spawnParticles(this.cx, this.cy, '#ffff00', 20);
            spawnParticles(this.cx, this.cy, '#ffffff', 8);
            // Lingering explosion ring (using slow-moving large particles)
            for (let i = 0; i < 12; i++) {
                const a = (i / 12) * Math.PI * 2;
                particles.push(new Particle(this.cx, this.cy, '#ff4400', Math.cos(a)*2, Math.sin(a)*2, 40));
            }
            for (let i = 0; i < 8; i++) {
                const a = (i / 8) * Math.PI * 2;
                particles.push(new Particle(this.cx, this.cy, '#ffaa00', Math.cos(a)*1.2, Math.sin(a)*1.2, 50));
            }
            shake = 15;
            playSound('explosion');
            score += 50 * comboMultiplier;
            spawnScorePopup(this.cx, this.cy, 50 * comboMultiplier);
            // Friendly fire
            const ex = this.cx, ey = this.cy;
            enemies.forEach(e => {
                if (e.alive && e !== this && Math.hypot(e.cx - ex, e.cy - ey) < 100) {
                    e.takeDamage(ex, 4, 0, true);
                }
            });
            // Direct 1 heart damage to player
            if (player.alive && player.invuln <= 0) {
                player.hp = Math.max(0, player.hp - 1);
                player.invuln = P_INVULN;
                comboMultiplier = 1; comboTimer = 0;
                player.vy = -6;
                player.vx = (player.cx > this.cx ? 5 : -5);
                shake = 12;
                playSound('hurt');
                spawnParticles(player.cx, player.cy, '#ff4444', 8);
                if (player.hp <= 0) player.alive = false;
            }
            checkExtraLife();
        }
    }
    takeDamage(fromX, dmg, batchId, force) {
        if (!force && this.invuln > 0 && this.lastBatchId !== batchId) return;
        dmg = dmg || 1;
        this.hp -= dmg;
        this.invuln = 20;
        this.lastBatchId = batchId || 0;
        this.vy = -3;
        this.vx = (this.cx > fromX ? 3 : -3);
        playSound('hit');
        spawnParticles(this.cx, this.cy, this.color, 4);
        score += 10 * comboMultiplier;
        if (this.hp <= 0) {
            this.alive = false;
            spawnParticles(this.cx, this.cy, '#cc0000', 12);
            spawnParticles(this.cx, this.cy, '#880000', 8);
            spawnParticles(this.cx, this.cy, '#ff2222', 6);
            score += 50 * comboMultiplier;
            spawnScorePopup(this.cx, this.cy, 50 * comboMultiplier);
            comboTimer = comboMaxTimer;
            if (comboMultiplier < 5) {
                comboMultiplier++;
                playComboSound(comboMultiplier);
            }
            if (this.type === 'exploder') {
                // Drop a timed bomb instead of instant explosion
                bombs.push(new Bomb(this.cx, this.cy));
            }
        }
        checkExtraLife();
    }
    draw(cx) {
        if (!this.alive) return;
        if (this.invuln > 0 && Math.floor(this.invuln/3) % 2 === 0) return;
        // Exploder glow warning
        if (this.type === 'exploder') {
            cx.globalAlpha = 0.12 + Math.sin(Date.now()/150)*0.06;
            cx.fillStyle = '#ff8800';
            cx.beginPath(); cx.arc(this.cx - cam.x, this.cy - cam.y, 40, 0, Math.PI*2); cx.fill();
            cx.globalAlpha = 1;
        }
        drawStick(cx, this.x, this.y, this.w, this.h, this.facing, undefined, this.walkPhase, this.color, 1, false);
        // Exploder bomb on back
        if (this.type === 'exploder') {
            const bx = this.cx - cam.x - this.facing * 8;
            const by = this.y + 16 - cam.y;
            // Bomb body
            cx.fillStyle = '#333';
            cx.beginPath(); cx.arc(bx, by, 5, 0, Math.PI*2); cx.fill();
            // Fuse
            cx.strokeStyle = '#aa6600'; cx.lineWidth = 1.5;
            cx.beginPath(); cx.moveTo(bx, by-5); cx.quadraticCurveTo(bx-this.facing*3, by-10, bx-this.facing*2, by-13); cx.stroke();
            // Fuse spark
            const sparkA = 0.5 + Math.sin(Date.now()/80) * 0.5;
            cx.globalAlpha = sparkA;
            cx.fillStyle = '#ffff44';
            cx.beginPath(); cx.arc(bx-this.facing*2, by-13, 2.5, 0, Math.PI*2); cx.fill();
            cx.fillStyle = '#ff8800';
            cx.beginPath(); cx.arc(bx-this.facing*2, by-13, 1.5, 0, Math.PI*2); cx.fill();
            cx.globalAlpha = 1;
            // Straps
            cx.strokeStyle = '#555'; cx.lineWidth = 1;
            cx.beginPath(); cx.moveTo(bx+this.facing*3, by-3); cx.lineTo(this.cx-cam.x, by-3); cx.stroke();
            cx.beginPath(); cx.moveTo(bx+this.facing*3, by+3); cx.lineTo(this.cx-cam.x, by+3); cx.stroke();
        }
        // Flyer wings
        if (this.type === 'flyer') {
            const ex = this.cx - cam.x, ey = this.y + 12 - cam.y;
            cx.strokeStyle = this.color; cx.lineWidth = 2; cx.lineCap = 'round';
            const wingFlap = Math.sin(Date.now()/80) * 8;
            cx.beginPath(); cx.moveTo(ex, ey); cx.lineTo(ex-14, ey-10+wingFlap); cx.lineTo(ex-6, ey+wingFlap*0.3); cx.stroke();
            cx.beginPath(); cx.moveTo(ex, ey); cx.lineTo(ex+14, ey-10+wingFlap); cx.lineTo(ex+6, ey+wingFlap*0.3); cx.stroke();
        }
        const bw = 24, bh = 3;
        const bx = this.x + this.w/2 - bw/2 - cam.x;
        const by = this.y - 8 - cam.y;
        cx.fillStyle = '#333'; cx.fillRect(bx, by, bw, bh);
        cx.fillStyle = '#44ff44'; cx.fillRect(bx, by, bw * (this.hp/this.maxHp), bh);
    }
}

// ======================== PICKUP ========================
class Pickup {
    constructor(x, y, weaponType) {
        this.x = x; this.y = y; this.w = 24; this.h = 24;
        this.weaponType = weaponType;
        this.collected = false;
        this.bobPhase = rand(0, Math.PI*2);
    }
    update() { this.bobPhase += 0.05; }
    draw(cx) {
        if (this.collected) return;
        const w = WEAPONS[this.weaponType];
        const sx = this.x - cam.x;
        const sy = this.y - cam.y + Math.sin(this.bobPhase) * 4;
        // Glow
        cx.globalAlpha = 0.15 + Math.sin(this.bobPhase*2)*0.08;
        cx.fillStyle = w.color;
        cx.beginPath(); cx.arc(sx + this.w/2, sy + this.h/2, 22, 0, Math.PI*2); cx.fill();
        cx.globalAlpha = 1;
        // Box
        cx.fillStyle = '#111';
        cx.fillRect(sx+1, sy+1, this.w-2, this.h-2);
        cx.strokeStyle = w.color; cx.lineWidth = 2;
        cx.strokeRect(sx, sy, this.w, this.h);
        // Gun shape icon
        cx.strokeStyle = w.color; cx.lineWidth = 2.5; cx.lineCap = 'round';
        cx.beginPath(); cx.moveTo(sx+5, sy+this.h/2); cx.lineTo(sx+this.w-5, sy+this.h/2); cx.stroke();
        cx.beginPath(); cx.moveTo(sx+this.w/2, sy+this.h/2); cx.lineTo(sx+this.w/2-2, sy+this.h-5); cx.stroke();
        // Label
        cx.fillStyle = w.color;
        cx.font = 'bold 9px monospace'; cx.textAlign = 'center';
        cx.fillText(w.name, sx + this.w/2, sy - 6);
        cx.textAlign = 'left';
    }
}

// ======================== BOMB (delayed exploder) ========================
class Bomb {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.timer = 30; // 0.5 seconds
        this.exploded = false;
    }
    update() {
        if (this.exploded) return;
        this.timer--;
        if (this.timer <= 0) {
            this.exploded = true;
            spawnParticles(this.x, this.y, '#ff8800', 25);
            spawnParticles(this.x, this.y, '#ffff00', 15);
            shake = 12;
            playSound('explosion');
            // Friendly fire: damage nearby enemies
            enemies.forEach(e => {
                if (e.alive && Math.hypot(e.cx - this.x, e.cy - this.y) < 100) {
                    e.takeDamage(this.x, 4, 0, true);
                }
            });
            if (player.alive && Math.hypot(player.cx - this.x, player.cy - this.y) < 100) {
                // 1 heart of damage
                player.hp = Math.max(0, player.hp - 1);
                player.invuln = P_INVULN;
                comboMultiplier = 1; comboTimer = 0;
                player.vy = -6;
                player.vx = (player.cx > this.x ? 5 : -5);
                shake = 12;
                playSound('hurt');
                spawnParticles(player.cx, player.cy, '#ff4444', 8);
                if (player.hp <= 0) player.alive = false;
            }
        }
    }
    draw(cx) {
        if (this.exploded) return;
        const sx = this.x - cam.x, sy = this.y - cam.y;
        const urgency = 1 - this.timer / 30;
        const flicker = Math.sin(this.timer * (0.3 + urgency * 0.7)) > 0;
        // Growing danger glow - matches 108px blast radius
        const glowR = 15 + urgency * 85;
        // Dark outline ring
        cx.globalAlpha = 0.3 + urgency * 0.3;
        cx.strokeStyle = '#220000';
        cx.lineWidth = 3;
        cx.beginPath(); cx.arc(sx, sy, glowR + 2, 0, Math.PI*2); cx.stroke();
        // Glow fill
        cx.globalAlpha = 0.1 + urgency * 0.25;
        cx.fillStyle = '#ff4400';
        cx.beginPath(); cx.arc(sx, sy, glowR, 0, Math.PI*2); cx.fill();
        cx.globalAlpha = 1;
        // Bomb body
        cx.fillStyle = flicker ? '#ff6600' : '#aa3300';
        cx.beginPath(); cx.arc(sx, sy, 7, 0, Math.PI*2); cx.fill();
        if (flicker) {
            cx.fillStyle = '#ffff44';
            cx.beginPath(); cx.arc(sx, sy-9, 3, 0, Math.PI*2); cx.fill();
        }
    }
}

// ======================== GRENADE (player grenade launcher) ========================
class Grenade {
    constructor(x, y, vx, vy) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.alive = true; this.trail = [];
        this.radius = 100; this.maxDmg = 10; this.minDmg = 3;
    }
    update() {
        this.trail.push({x: this.x, y: this.y});
        if (this.trail.length > 8) this.trail.shift();
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.35;
        if (this.x < cam.x - 50 || this.x > cam.x + GW + 50 || this.y > cam.y + GH + 200) { this.alive = false; return; }
        for (const p of platforms) {
            if (rects({x:this.x-4,y:this.y-4,w:8,h:8}, p)) { this.explode(); return; }
        }
        for (const e of enemies) {
            if (e.alive && rects({x:this.x-4,y:this.y-4,w:8,h:8}, e)) { this.explode(); return; }
        }
        if (boss && boss.alive && boss.active && rects({x:this.x-4,y:this.y-4,w:8,h:8}, boss)) { this.explode(); return; }
    }
    explode() {
        this.alive = false;
        spawnParticles(this.x, this.y, '#44cc44', 20);
        spawnParticles(this.x, this.y, '#88ff88', 12);
        spawnParticles(this.x, this.y, '#ffffff', 6);
        for (let i = 0; i < 16; i++) {
            const a = (i / 16) * Math.PI * 2;
            particles.push(new Particle(this.x, this.y, '#44cc44', Math.cos(a)*3, Math.sin(a)*3, 30));
        }
        shake = 10;
        playSound('explosion');
        const ex = this.x, ey = this.y;
        enemies.forEach(e => {
            if (!e.alive) return;
            const d = Math.hypot(e.cx - ex, e.cy - ey);
            if (d < this.radius) {
                const t = d / this.radius;
                const dmg = Math.round(this.maxDmg - (this.maxDmg - this.minDmg) * t);
                e.takeDamage(ex, dmg);
            }
        });
        if (boss && boss.alive && boss.active) {
            const d = Math.hypot(boss.cx - ex, boss.cy - ey);
            if (d < this.radius) {
                const t = d / this.radius;
                const dmg = Math.round(this.maxDmg - (this.maxDmg - this.minDmg) * t);
                boss.takeDamage(ex, dmg);
            }
        }
    }
    draw(cx) {
        for (let i = 0; i < this.trail.length; i++) {
            const a = (i+1)/this.trail.length * 0.3;
            cx.globalAlpha = a;
            cx.fillStyle = '#44cc44';
            cx.beginPath();
            cx.arc(this.trail[i].x - cam.x, this.trail[i].y - cam.y, 2, 0, Math.PI*2);
            cx.fill();
        }
        cx.globalAlpha = 1;
        cx.fillStyle = '#225522';
        cx.beginPath();
        cx.arc(this.x - cam.x, this.y - cam.y, 5, 0, Math.PI*2);
        cx.fill();
        cx.fillStyle = '#44cc44';
        cx.beginPath();
        cx.arc(this.x - cam.x, this.y - cam.y, 3, 0, Math.PI*2);
        cx.fill();
    }
}

// ======================== SHOCKWAVE (boss ground attack) ========================
class Shockwave {
    constructor(x, y, direction) {
        this.x = x; this.y = y;
        this.direction = direction;
        this.speed = 4.5;
        this.alive = true;
        this.life = 150; this.maxLife = 150;
    }
    update() {
        this.x += this.speed * this.direction;
        this.life--;
        if (this.life <= 0) this.alive = false;
        if (player.alive && player.invuln <= 0 && player.grounded) {
            const playerFeetY = player.y + player.h;
            if (Math.abs(playerFeetY - this.y) < 30) {
                if (rects({x:this.x-12, y:this.y-20, w:24, h:20}, player)) {
                    player.takeDamage(this.x);
                }
            }
        }
    }
    draw(cx) {
        const sx = this.x - cam.x, sy = this.y - cam.y;
        const alpha = Math.min(1, this.life / 30);
        cx.globalAlpha = alpha * 0.8;
        cx.fillStyle = '#44cc88';
        cx.beginPath();
        cx.moveTo(sx - 12*this.direction, sy);
        cx.lineTo(sx + 5*this.direction, sy - 18);
        cx.lineTo(sx + 12*this.direction, sy);
        cx.closePath(); cx.fill();
        cx.fillStyle = '#88ffaa';
        cx.beginPath();
        cx.moveTo(sx - 6*this.direction, sy);
        cx.lineTo(sx + 3*this.direction, sy - 10);
        cx.lineTo(sx + 8*this.direction, sy);
        cx.closePath(); cx.fill();
        cx.globalAlpha = 1;
    }
}

// ======================== BOSS ========================
class Boss {
    constructor(cfg) {
        this.x = cfg.x; this.y = cfg.y; this.w = 30; this.h = 60;
        this.vx = 0; this.vy = 0;
        this.hp = cfg.hp; this.maxHp = cfg.hp;
        this.name = cfg.name; this.color = cfg.color;
        this.drawType = cfg.drawType || 'default';
        this.shootRate = cfg.shootRate || 90;
        this.jumpRate = cfg.jumpRate || 180;
        this.spreadCount = cfg.spreadCount || 1;
        this.shootCD = this.shootRate;
        this.jumpCD = this.jumpRate;
        this.facing = -1; this.grounded = false;
        this.walkPhase = 0; this.invuln = 0;
        this.alive = true; this.active = false;
        this.lastBatchId = 0;
        this.arenaL = cfg.arenaL || 0;
        this.arenaR = cfg.arenaR || 5000;
        this.speed = cfg.speed || 2;
        this.quote = cfg.quote || '';
        this.introTimer = 150;
        // Pattern system
        this.patternTimer = 0;
        this.patternPhase = 0;
        this.burstCount = 0;
        this.burstCD = 0;
        this.bossPhase = 1;
        this.shadowAlpha = 1;
        this.shadowMode = false;
        this.isTransitioning = false;
        this.chargeFacing = 1;
    }
    get cx() { return this.x + this.w/2; }
    get cy() { return this.y + this.h/2; }
    update() {
        if (!this.alive || !this.active) return;
        if (this.introTimer > 0) { this.introTimer--; return; }
        if (this.invuln > 0) this.invuln--;
        if (this.burstCD > 0) this.burstCD--;
        this.patternTimer++;
        // Transitioning state (Dark Lord phase 2 intro)
        if (this.isTransitioning) {
            this.vx *= 0.9;
            if (this.invuln <= 0) this.isTransitioning = false;
            this.applyPhysics();
            return;
        }
        if (player.alive) this.facing = player.cx > this.cx ? 1 : -1;
        switch(this.drawType) {
            case 'thug': this.updateThug(); break;
            case 'bandit': this.updateBandit(); break;
            case 'ninja': this.updateNinja(); break;
            case 'troll': this.updateTroll(); break;
            case 'lord': this.updateLord(); break;
            default: this.updateDefault(); break;
        }
        if (Math.abs(this.vx) > 0.2 && this.grounded) this.walkPhase += Math.abs(this.vx) * 0.12;
        this.applyPhysics();
    }
    enterPhase(p) {
        this.patternPhase = p;
        this.patternTimer = 0;
        this.burstCount = 0;
    }
    bossShoot(speedMult, spreadOverride) {
        if (!player.alive) return;
        const dx = player.cx - this.cx, dy = player.cy - this.cy;
        const baseAngle = Math.atan2(dy, dx);
        const spd = E_PROJ_SPD * (speedMult || 1.1) * (this.projSpeedMult || 1);
        const proj = new Projectile(this.cx, this.y+20, Math.cos(baseAngle)*spd, Math.sin(baseAngle)*spd, 'enemy', this.color);
        if (this.drawType === 'lord') proj.gravity = 0.012;
        if (this.drawType === 'troll') proj.passThrough = true;
        projectiles.push(proj);
        playSound('enemyShoot');
    }
    moveToward(speedMult) {

        if (this.x + this.w > this.arenaR) { this.x = this.arenaR - this.w; this.vx = 0; }

            if (rects(this, p)) {
                if (this.vx > 0) this.x = p.x - this.w;
                else if (this.vx < 0) this.x = p.x + p.w;
                this.vx = 0;
            }

        this.y += this.vy;

                    this.y = p.y - this.h; this.vy = 0; this.grounded = true;
